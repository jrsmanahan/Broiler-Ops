                        <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#94A3B8"}}>ALW</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:13,color:"#C4960C"}}>{dayALW.toFixed(3)}</div></div>
                      </div>
                    </div>
                    <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderTop:"none",borderRadius:"0 0 6px 6px",overflow:"hidden"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 80px 1fr 32px",padding:"6px 14px",background:"#F5F7FA",fontSize:8,color:"#94A3B8",letterSpacing:1}}>
                        <div>PLATE</div><div style={{textAlign:"right"}}>HEADS</div><div style={{textAlign:"right"}}>KG</div><div style={{textAlign:"right"}}>ALW</div><div>NOTES</div><div></div>
                      </div>
                      {trucks.map(function(t){
                        return (
                          <div key={t.id} className="row" style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 80px 1fr 32px",padding:"9px 14px",borderBottom:"1px solid #F0F2F5",fontSize:11,alignItems:"center"}}>
                            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,color:"#1E293B"}}>{t.plate}</div>
                            <div style={{textAlign:"right",color:"#334155"}}>{(t.heads||0).toLocaleString()}</div>
                            <div style={{textAlign:"right",color:"#5B86E5",fontWeight:600}}>{(t.kg||0).toLocaleString(undefined,{maximumFractionDigits:2})}</div>
                            <div style={{textAlign:"right",color:"#C4960C",fontWeight:600}}>{t.alw?t.alw.toFixed(3):"—"}</div>
                            <div style={{color:"#64748B",fontSize:10}}>{t.notes||"—"}</div>
                            <button onClick={function(){setHarvestTrucks(function(p){return p.filter(function(x){return x.id!==t.id;});});}} style={{background:"none",border:"1px solid #E91E6340",color:"#E91E6380",fontFamily:"'Inter',sans-serif",fontSize:11,width:24,height:24,cursor:"pointer",borderRadius:4,padding:0}}>×</button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              });
            })()}
          </div>
        )}
        {activeTab==="history" && (
          <div className="su">
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,marginBottom:4}}>Grow Cycle History</div>
            <div style={{fontSize:11,color:"#64748B",marginBottom:14}}>All completed cycles · compare performance across grows</div>
            {/* Sub-tabs */}
            <div style={{display:"flex",gap:6,marginBottom:18}}>
              {[["cycles","📋 CYCLES"],["compare","⇆ COMPARE"]].map(function(item){
                var id=item[0]; var label=item[1];
                return (
                  <button key={id} onClick={function(){setHistorySubTab(id);setExpandedCycle(null);}} style={{
                    background:historySubTab===id?"#2E7D52":"none",
                    border:historySubTab===id?"none":"1px solid #CBD5E1",
                    color:historySubTab===id?"#FFFFFF":"#64748B",
                    fontFamily:"'Inter',sans-serif",fontSize:10,fontWeight:historySubTab===id?700:400,
                    padding:"7px 18px",cursor:"pointer",borderRadius:6,
                  }}>{label}</button>
                );
              })}
            </div>

            {/* ── CYCLES sub-tab ── */}
            {historySubTab==="cycles" && (
              <div>
                {cycleHistory.length === 0 ? (
                  <div style={{textAlign:"center",padding:"48px 20px",color:"#94A3B8"}}>
                    <div style={{fontSize:32,marginBottom:12}}>⌛</div>
                    <div style={{fontSize:14,fontWeight:600,color:"#64748B",marginBottom:6}}>No completed cycles yet</div>
                    <div style={{fontSize:12}}>When you press End Cycle, all grow data is saved here for future reference.</div>
                  </div>
                ) : [...cycleHistory].reverse().map(function(cycle,idx){
                  var s = computeCycleSummary(cycle);
                  var isOpen = expandedCycle === cycle.cycleNumber;
                  return (
                    <div key={idx} style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,marginBottom:10,overflow:"hidden"}}>
                      <div onClick={function(){setExpandedCycle(isOpen?null:cycle.cycleNumber);}} style={{padding:"14px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:14,color:"#1E293B"}}>Cycle {cycle.cycleNumber} — {cycle.breed}</div>
                          <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{cycle.placementDate} → {cycle.endDate} · {s.days} days · {s.netPlaced.toLocaleString()} heads</div>
                        </div>
                        <div style={{display:"flex",gap:16,alignItems:"center",flexShrink:0}}>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:s.harvestRecovery?(s.harvestRecovery>=98?"#2E7D52":s.harvestRecovery>=95?"#C4960C":"#E91E63"):"#94A3B8"}}>{s.harvestRecovery?s.harvestRecovery.toFixed(2)+"%":"—"}</div>
                            <div style={{fontSize:9,color:"#94A3B8"}}>HARVEST RECOVERY</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:s.bpi?(s.bpi>=400?"#2E7D52":s.bpi>=350?"#5B86E5":s.bpi>=300?"#C4960C":"#E91E63"):"#94A3B8"}}>{s.bpi?s.bpi.toFixed(0):"—"}</div>
                            <div style={{fontSize:9,color:"#94A3B8"}}>BPI</div>
                          </div>
                          <div style={{color:"#CBD5E1",fontSize:16}}>{isOpen?"▲":"▼"}</div>
                        </div>
                      </div>
                      {isOpen && (
                        <div style={{borderTop:"1px solid #F0F2F5",padding:"14px 16px"}}>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
                            {[
                              {l:"FLOCK PLACED",v:s.netPlaced.toLocaleString(),u:"heads"},
                              {l:"TOTAL DAYS",v:s.days,u:"days"},
                              {l:"HARVESTED BIRDS",v:(s.totalHarvestedHeads||0).toLocaleString(),u:"heads"},
                              {l:"HARVEST RECOVERY",v:s.harvestRecovery?s.harvestRecovery.toFixed(2)+"%":"—",u:"",c:s.harvestRecovery?(s.harvestRecovery>=98?"#2E7D52":s.harvestRecovery>=95?"#C4960C":"#E91E63"):"#94A3B8"},
                              {l:"MORTALITY",v:s.totalMortality,u:"birds",c:"#E91E63"},
                              {l:"MORTALITY RATE",v:s.mortalityRate?s.mortalityRate.toFixed(2)+"%":"—",u:""},
                              {l:"HARVEST ALW",v:s.finalALWg?s.finalALWg+"g":"—",u:""},
                              {l:"TOTAL HARVEST KG",v:s.totalHarvestKg?s.totalHarvestKg.toLocaleString(undefined,{maximumFractionDigits:1}):"—",u:"kg"},
                              {l:"WEIGHTED AVG AGE",v:s.weightedAge?s.weightedAge.toFixed(1)+"d":"—",u:""},
                              {l:"TOTAL FEED (NET)",v:s.netFeedKg?Math.round(s.netFeedKg).toLocaleString():"—",u:"kg"},
                              {l:"FEED / BIRD",v:s.feedPerBird?s.feedPerBird.toFixed(2):"—",u:"kg"},
                              {l:"FCR",v:s.fcr?s.fcr.toFixed(3):"—",u:""},
                              {l:"BPI",v:s.bpi?s.bpi.toFixed(0):"—",u:"",c:s.bpi?(s.bpi>=400?"#2E7D52":s.bpi>=350?"#5B86E5":s.bpi>=300?"#C4960C":"#E91E63"):"#94A3B8"},
                            ].map(function(m,i){
                              return (
                                <div key={i} style={{background:"#F5F7FA",borderRadius:6,padding:"10px 12px"}}>
                                  <div style={{fontSize:9,color:"#94A3B8",letterSpacing:.8,marginBottom:2}}>{m.l}</div>
                                  <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:m.c||"#1E293B"}}>{String(m.v)}</div>
                                  {m.u && <div style={{fontSize:9,color:"#64748B"}}>{m.u}</div>}
                                </div>
                              );
                            })}
                          </div>
                          {(s.cbcBags>0||s.bscBags>0||s.bfpBags>0) && (
                            <div style={{borderTop:"1px solid #F0F2F5",paddingTop:12}}>
                              <div style={{fontSize:9,color:"#64748B",letterSpacing:1,marginBottom:8}}>FEED DELIVERED BY TYPE</div>
                              <div style={{display:"flex",gap:10}}>
                                <div style={{flex:1,background:"#F5F7FA",borderRadius:6,padding:"10px 12px",borderTop:"3px solid #E5B80B"}}><div style={{fontSize:9,color:"#94A3B8"}}>CBC</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:"#E5B80B"}}>{s.cbcBags}</div><div style={{fontSize:9,color:"#64748B"}}>bags</div></div>
                                <div style={{flex:1,background:"#F5F7FA",borderRadius:6,padding:"10px 12px",borderTop:"3px solid #D4652A"}}><div style={{fontSize:9,color:"#94A3B8"}}>BSC</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:"#D4652A"}}>{s.bscBags}</div><div style={{fontSize:9,color:"#64748B"}}>bags</div></div>
                                <div style={{flex:1,background:"#F5F7FA",borderRadius:6,padding:"10px 12px",borderTop:"3px solid #5B86E5"}}><div style={{fontSize:9,color:"#94A3B8"}}>BFP</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,color:"#5B86E5"}}>{s.bfpBags}</div><div style={{fontSize:9,color:"#64748B"}}>bags</div></div>
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── COMPARE sub-tab ── */}
            {historySubTab==="compare" && (function(){
              var cyclePlacementMonth = cycleConfig ? new Date(cycleConfig.placementDate + "T00:00:00+08:00").getMonth() : -1;
              var cyclePlacementYear = cycleConfig ? new Date(cycleConfig.placementDate + "T00:00:00+08:00").getFullYear() : -1;
              var prevCycle = cycleHistory.length > 0 ? cycleHistory[cycleHistory.length-1] : null;
              var lastYearCycle = cycleHistory.filter(function(c){
                var d = new Date(c.placementDate + "T00:00:00+08:00");
                return d.getMonth() === cyclePlacementMonth && d.getFullYear() === cyclePlacementYear - 1;
              });
              var sameMonthLastYear = lastYearCycle.length > 0 ? lastYearCycle[lastYearCycle.length-1] : null;

              // Current cycle summary from live data
              // Canonical mortality — first AM + first PM per day (matches Daily Log table)
              var curDaySet = {};
              var curMortality = 0;
              shiftLogs.forEach(function(l){
                if (!curDaySet[l.day]) curDaySet[l.day] = {};
                if (!curDaySet[l.day][l.shift]) { curDaySet[l.day][l.shift] = l; curMortality += l.mortality||0; }
              });
              var curFeedBags = shiftLogs.reduce(function(s,l){return s+(l.feedsConsumed||0);},0);
              var curFeedKg = curFeedBags * 50;
              var curSurvivors = netPlacedBirds - curMortality;
              var curHR = netPlacedBirds > 0 ? (curSurvivors / netPlacedBirds * 100) : null;
              var curFeedPerBird = curSurvivors > 0 ? (curFeedKg / curSurvivors) : null;
              var curMortRate = netPlacedBirds > 0 ? (curMortality / netPlacedBirds * 100) : null;
              var curCBCBags = feedDeliveries.filter(function(d){return d.type==="CBC";}).reduce(function(s,d){return s+d.qty;},0);
              var curBSCBags = feedDeliveries.filter(function(d){return d.type==="BSC";}).reduce(function(s,d){return s+d.qty;},0);
              var curBFPBags = feedDeliveries.filter(function(d){return d.type==="BFP";}).reduce(function(s,d){return s+d.qty;},0);
              var curTotalDeliveredBags = curCBCBags + curBSCBags + curBFPBags;
              var curNetFeedKg = (curTotalDeliveredBags - (surplusFeedBags||0)) * 50;
              var curTotalHarvestedHeads = harvestTrucks.reduce(function(s,t){return s+(t.heads||0);},0);
              var curTotalHarvestKg = harvestTrucks.reduce(function(s,t){return s+(t.kg||0);},0);
              var curHarvestALW = curTotalHarvestedHeads > 0 ? curTotalHarvestKg / curTotalHarvestedHeads : null;
              var curHarvestRecovery = netPlacedBirds > 0 && curTotalHarvestedHeads > 0 ? (curTotalHarvestedHeads / netPlacedBirds * 100) : null;
              var curWeightedAge = curTotalHarvestedHeads > 0 ? harvestTrucks.reduce(function(s,t){return s+((t.day||0)*(t.heads||0));},0) / curTotalHarvestedHeads : null;
              var curFCR = curTotalHarvestKg > 0 && curNetFeedKg > 0 ? curNetFeedKg / curTotalHarvestKg : null;
              var curFeedPerBirdH = curTotalHarvestedHeads > 0 ? curNetFeedKg / curTotalHarvestedHeads : null;
              var curBPI = (curHarvestRecovery && curHarvestALW && curFCR && curWeightedAge) ? (curHarvestRecovery * curHarvestALW) / (curFCR * curWeightedAge) * 100 : null;
              var cur = {
                netPlaced:netPlacedBirds, days:currentDay,
                totalHarvestedHeads:curTotalHarvestedHeads, totalHarvestKg:curTotalHarvestKg,
                harvestRecovery:curHarvestRecovery, finalALWg:curHarvestALW?Math.round(curHarvestALW*1000):null,
                weightedAge:curWeightedAge, totalMortality:curMortality, mortalityRate:curMortRate,
                netFeedKg:curNetFeedKg, feedPerBird:curFeedPerBirdH, fcr:curFCR, bpi:curBPI,
                cbcBags:curCBCBags, bscBags:curBSCBags, bfpBags:curBFPBags,
              };
              var prev = prevCycle ? computeCycleSummary(prevCycle) : null;
              var smly = sameMonthLastYear ? computeCycleSummary(sameMonthLastYear) : null;

              var cols = [
                {label:"CURRENT", sub:cycleConfig?("Placed "+cycleConfig.placementDate):"Active cycle", s:cur, color:"#2E7D52"},
                {label:"PREVIOUS", sub:prevCycle?("Placed "+prevCycle.placementDate):"No previous cycle", s:prev, color:"#5B86E5"},
                {label:"SAME MONTH LAST YEAR", sub:sameMonthLastYear?("Placed "+sameMonthLastYear.placementDate):"No data from same period", s:smly, color:"#C4960C"},
              ];

              var metrics = [
                {key:"days",              label:"Days",                fmt:function(v){return v+" d";}},
                {key:"netPlaced",         label:"Flock Placed",        fmt:function(v){return v.toLocaleString()+" heads";}},
                {key:"totalHarvestedHeads",label:"Harvested Birds",    fmt:function(v){return v.toLocaleString()+" heads";}},
                {key:"harvestRecovery",   label:"Harvest Recovery",    fmt:function(v){return v.toFixed(2)+"%";}},
                {key:"finalALWg",         label:"Harvest ALW",         fmt:function(v){return v+"g";}},
                {key:"totalHarvestKg",    label:"Total Harvest KG",    fmt:function(v){return v.toLocaleString(undefined,{maximumFractionDigits:1})+" kg";}},
                {key:"weightedAge",       label:"Weighted Avg Age",    fmt:function(v){return v.toFixed(1)+" d";}},
                {key:"totalMortality",    label:"Total Mortality",     fmt:function(v){return v+" birds";}, lower:true},
                {key:"mortalityRate",     label:"Mortality Rate",      fmt:function(v){return v.toFixed(2)+"%";}, lower:true},
                {key:"netFeedKg",         label:"Total Feed (net kg)", fmt:function(v){return Math.round(v).toLocaleString()+" kg";}},
                {key:"feedPerBird",       label:"Feed / Bird",         fmt:function(v){return v.toFixed(2)+" kg";}},
                {key:"fcr",               label:"FCR",                 fmt:function(v){return v.toFixed(3);}, lower:true},
                {key:"bpi",               label:"BPI",                 fmt:function(v){return v.toFixed(0);}},
                {key:"cbcBags",           label:"CBC Delivered",       fmt:function(v){return v+" bags";}},
                {key:"bscBags",           label:"BSC Delivered",       fmt:function(v){return v+" bags";}},
                {key:"bfpBags",           label:"BFP Delivered",       fmt:function(v){return v+" bags";}},
              ];

              return (
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:520}}>
                    <thead>
                      <tr>
                        <th style={{padding:"8px 12px",textAlign:"left",fontSize:9,color:"#94A3B8",letterSpacing:1,width:"28%"}}></th>
                        {cols.map(function(c){
                          return (
                            <th key={c.label} style={{padding:"8px 12px",textAlign:"center",borderBottom:"3px solid "+c.color}}>
                              <div style={{fontSize:10,fontWeight:700,color:c.color,letterSpacing:.5}}>{c.label}</div>
                              <div style={{fontSize:9,color:"#94A3B8",fontWeight:400,marginTop:2}}>{c.sub}</div>
                            </th>
                          );
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {metrics.map(function(m){
                        // Find best value across columns for highlighting
                        var vals = cols.map(function(c){return c.s?c.s[m.key]:null;});
                        var numVals = vals.filter(function(v){return v!==null&&v!==undefined&&!isNaN(v);});
                        var best = numVals.length ? (m.lower ? Math.min.apply(null,numVals) : Math.max.apply(null,numVals)) : null;
                        return (
                          <tr key={m.key} style={{borderBottom:"1px solid #F0F2F5"}}>
                            <td style={{padding:"10px 12px",fontSize:9,color:"#64748B",letterSpacing:.8,fontWeight:600}}>{m.label}</td>
                            {cols.map(function(c){
                              var v = c.s ? c.s[m.key] : null;
                              var isBest = v!==null&&v!==undefined&&!isNaN(v)&&numVals.length>1&&v===best;
                              return (
                                <td key={c.label} style={{padding:"10px 12px",textAlign:"center",background:isBest?"#2E7D5208":"transparent"}}>
                                  {c.s ? (
                                    <span style={{fontFamily:"'Inter',sans-serif",fontWeight:isBest?700:400,fontSize:12,color:isBest?"#2E7D52":"#334155"}}>
                                      {v!==null&&v!==undefined&&!isNaN(v)?m.fmt(v):"—"}
                                    </span>
                                  ) : (
                                    <span style={{fontSize:11,color:"#CBD5E1"}}>—</span>
                                  )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {cycleHistory.length === 0 && (
                    <div style={{textAlign:"center",padding:"20px",fontSize:11,color:"#94A3B8",marginTop:8}}>Complete your first cycle to unlock comparison data.</div>
                  )}
                </div>
              );
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// ─── APP SHELL — auth, house picker/setup, offline-first sync ────────────────
// ═════════════════════════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  componentDidCatch(err, info) { console.error("App crashed:", err, info); }
  render() {
    if (this.state.error) {
      return React.createElement('div', { style: { padding: 24, fontFamily: "'Inter',sans-serif" } },
        React.createElement('div', { style: { fontWeight: 700, fontSize: 16, color: '#E91E63', marginBottom: 8 } }, 'Something went wrong'),
        React.createElement('div', { style: { fontSize: 12, color: '#64748B', marginBottom: 12 } }, this.state.error.message),
        React.createElement('pre', { style: { fontSize: 10, color: '#94A3B8', whiteSpace: 'pre-wrap', background: '#F5F7FA', padding: 12, borderRadius: 6 } }, this.state.error.stack),
        React.createElement('button', { onClick: () => window.location.reload(), style: { marginTop: 16, background: '#2E7D52', border: 'none', color: '#fff', padding: '10px 20px', borderRadius: 6, cursor: 'pointer', fontFamily: "'Inter',sans-serif", fontWeight: 600 } }, 'Reload App')
      );
    }
    return this.props.children;
  }
}

function AppShell() {
  const [session, setSession] = useState(undefined); // undefined=loading, null=logged out, object=logged in
  const [subscription, setSubscription] = useState(null); // null=loading, object=loaded
  const [email, setEmail] = useState("");
  const [magicLinkSent, setMagicLinkSent] = useState(false);
  const [otpCode, setOtpCode] = useState("");
  const [verifyingOtp, setVerifyingOtp] = useState(false);
  const [authError, setAuthError] = useState(null);
  const [houses, setHouses] = useState(null); // null=loading
  const [selectedHouseId, setSelectedHouseId] = useState(null);
  const [showSetupForm, setShowSetupForm] = useState(false);
  const [setupDraft, setSetupDraft] = useState({ building_name:"", breed:"Ross 308", flock_size:"", placement_date:"", flockman_names:"", importLegacy:true });
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [syncTick, setSyncTick] = useState(0);
  const [editingHouseId, setEditingHouseId] = useState(null);
  const [editHouseDraft, setEditHouseDraft] = useState(null);

  const hasLegacyData = localStorage.getItem("beracah_2026_04_22_h1_shiftLogs") !== null;

  useEffect(() => {
    const sb = getSupabaseClient();
    if (!sb) { setSession(null); setAuthError("Supabase failed to load — check your internet connection and refresh."); return; }
    sb.auth.getSession().then(function(res) { setSession(res.data.session || null); });
    const sub = sb.auth.onAuthStateChange(function(event, newSession) { setSession(newSession || null); });
    const goOnline = () => { setIsOnline(true); setSyncTick(function(t){return t+1;}); };
    const goOffline = () => setIsOnline(false);
    // Fire syncTick on focus AND visibilitychange — both needed for mobile reliability
    // Day check uses syncTick so must fire regardless of connectivity
    const onFocus = () => setSyncTick(function(t){return t+1;});
    const onVisible = () => { if (document.visibilityState === "visible") setSyncTick(function(t){return t+1;}); };
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", onVisible);
    // Re-sync every 60 seconds while online
    const interval = setInterval(function(){ if (navigator.onLine) setSyncTick(function(t){return t+1;}); }, 60000);
    return () => {
      if (sub && sub.data && sub.data.subscription) sub.data.subscription.unsubscribe();
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
      window.removeEventListener("focus", onFocus);
      document.removeEventListener("visibilitychange", onVisible);
      clearInterval(interval);
    };
  }, []);

  // Check subscription whenever session changes
  useEffect(function() {
    if (!session) { setSubscription(null); return; }
    const sb = getSupabaseClient();
    if (!sb) return;
    const deviceLabel = getDeviceLabel();
    sb.from("subscriptions").select("status,trial_ends_at,activated_at,nickname,email")
      .eq("user_id", session.user.id).single()
      .then(function(res) {
        if (res.error || !res.data) {
          // No subscription record — create a trial
          const trialEnd = null; // starts when they log their first entry
          const userEmail = session.user.email || "";
          sb.from("subscriptions").insert({ user_id: session.user.id, status: "trial", trial_ends_at: trialEnd, email: userEmail, last_device: deviceLabel, last_seen_at: new Date().toISOString() })
            .then(function() {
              setSubscription({ status: "trial", trial_ends_at: null, daysLeft: null, nickname: null, email: userEmail, trialStarted: false });
            });
          return;
        }
        const d = res.data;
        var daysLeft = null;
        if (d.status === "trial" && d.trial_ends_at) {
          daysLeft = Math.ceil((new Date(d.trial_ends_at) - Date.now()) / 86400000);
          if (daysLeft < 0) daysLeft = 0;
        }
        // trial_ends_at = null means they haven't logged anything yet — trial hasn't started
        var trialStarted = d.status !== "trial" || d.trial_ends_at !== null;
        // Update device + last seen every time the app checks subscription status
        sb.from("subscriptions").update({ last_device: deviceLabel, last_seen_at: new Date().toISOString() })
          .eq("user_id", session.user.id).then(function(){});
        setSubscription({ status: d.status, trial_ends_at: d.trial_ends_at, daysLeft: daysLeft, nickname: d.nickname || null, email: d.email || session.user.email || "", trialStarted: trialStarted });
      });
  }, [session]);

  // Load houses once logged in
  useEffect(() => {
    if (!session) return;
    const cacheKey = "beracah_houses_" + session.user.id;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try { setHouses(JSON.parse(cached)); } catch (e) { setHouses([]); }
    }
    if (isOnline) {
      const sb = getSupabaseClient();
      const pendingKey = "beracah_pending_houses";
      sb.from("houses").select("*").eq("user_id", session.user.id).order("house_number")
        .then(function(res) {
          if (res.data) {
            const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
            const merged = res.data.concat(pending.filter(function(p) {
              return !res.data.some(function(h){ return h.id===p.id; });
            }));
            setHouses(merged);
            localStorage.setItem(cacheKey, JSON.stringify(merged));
          } else if (!cached) {
            setHouses([]);
          }
        });
      // Flush any pending offline-created houses — only clear queue on confirmed success
      const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
      if (pending.length > 0) {
        sb.from("houses").insert(pending).then(function(res) {
          if (!res.error) {
            localStorage.removeItem(pendingKey);
          } else {
            setAuthError("Could not sync house to server (saved locally, will retry): " + safeErrorMsg(res.error, "unknown error"));
          }
        });
      }
    } else if (!cached) {
      setHouses([]);
    }
  }, [session, isOnline]);

  const safeErrorMsg = function(err, fallback) {
    if (!err) return fallback;
    if (typeof err === "string") return err;
    if (err.message && typeof err.message === "string") return err.message;
    if (err.error_description && typeof err.error_description === "string") return err.error_description;
    if (err.status === 429 || (err.message||"").indexOf("rate limit") >= 0) return "Too many sign-in attempts. Please wait a few minutes and try again.";
    return fallback;
  };
  const sendMagicLink = () => {
    setAuthError(null);
    if (!email) return;
    const sb = getSupabaseClient();
    if (!sb) { setAuthError("Supabase failed to load — check your internet connection and refresh."); return; }
    sb.auth.signInWithOtp({ email: email }).then(function(res) {
      if (res.error) setAuthError(safeErrorMsg(res.error, "Could not send sign-in email. Please try again in a moment."));
      else setMagicLinkSent(true);
    }).catch(function(err) {
      setAuthError(safeErrorMsg(err, "Could not send sign-in email. Please check your connection and try again."));
    });
  };
  const verifyOtpCode = () => {
    setAuthError(null);
    if (!otpCode || otpCode.length < 4) { setAuthError("Enter the code from the email."); return; }
    const sb = getSupabaseClient();
    if (!sb) { setAuthError("Supabase failed to load — check your internet connection and refresh."); return; }
    setVerifyingOtp(true);
    sb.auth.verifyOtp({ email: email, token: otpCode.trim(), type: "email" }).then(function(res) {
      setVerifyingOtp(false);
      if (res.error) setAuthError(safeErrorMsg(res.error, "That code didn't work. Check it and try again, or request a new one."));
      // on success, onAuthStateChange picks up the new session automatically
    }).catch(function(err) {
      setVerifyingOtp(false);
      setAuthError(safeErrorMsg(err, "Could not verify the code. Please try again."));
    });
  };


  const handleLogout = () => {
    getSupabaseClient().auth.signOut().then(function() {
      setSession(null);
      setHouses(null);
      setSelectedHouseId(null);
    });
  };

  const saveHouseEdit = () => {
    if (!editHouseDraft.building_name || !editHouseDraft.placement_date) return;
    const original = houses.find(function(h){ return h.id===editingHouseId; });
    const updatedHouse = {
      ...original,
      building_name: editHouseDraft.building_name,
      breed: editHouseDraft.breed,
      flock_size: parseInt(editHouseDraft.flock_size) || 0,
      placement_date: editHouseDraft.placement_date,
    };
    const updated = houses.map(function(h){ return h.id===editingHouseId ? updatedHouse : h; });
    setHouses(updated);
    localStorage.setItem("beracah_houses_" + session.user.id, JSON.stringify(updated));
    if (isOnline) {
      getSupabaseClient().from("houses").update({
        building_name: updatedHouse.building_name, breed: updatedHouse.breed,
        flock_size: updatedHouse.flock_size, placement_date: updatedHouse.placement_date,
      }).eq("id", editingHouseId).then(function(res) {
        if (res.error) setAuthError("Could not sync the update to the server — it's saved on this device and will retry when online.");
      });
    }
    // If placement date changed, update cycleConfig to match — without touching logged data
    if (original.placement_date !== editHouseDraft.placement_date && cycleConfig) {
      const correctedDay = getCurrentDay(editHouseDraft.placement_date, cycleConfig.rolloverHour || 0);
      setCycleConfig(function(p){ return p ? {...p, placementDate: editHouseDraft.placement_date, dayOverride: correctedDay} : p; });
      setCurrentDay(correctedDay);
    }
    setEditingHouseId(null);
    setEditHouseDraft(null);
  };
  const submitSetup = () => {
    if (!setupDraft.building_name || !setupDraft.placement_date) return;
    const newHouse = {
      id: crypto.randomUUID(),
      user_id: session.user.id,
      house_number: houses.length + 1,
      building_name: setupDraft.building_name,
      breed: setupDraft.breed,
      flock_size: parseInt(setupDraft.flock_size) || 0,
      placement_date: setupDraft.placement_date,
      flockman_names: setupDraft.flockman_names ? setupDraft.flockman_names.split(",").map(function(s){return s.trim();}).filter(Boolean) : [],
      created_at: new Date().toISOString(),
    };
    const newNS = "beracah_house_" + newHouse.id + "_";
    if (setupDraft.importLegacy && hasLegacyData) {
      migrateLegacyData("beracah_2026_04_22_h1_", newNS);
    }
    if (isOnline) {
      getSupabaseClient().from("houses").insert(newHouse).then(function(res) {
        if (res.error) {
          const pendingKey = "beracah_pending_houses";
          const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
          pending.push(newHouse);
          localStorage.setItem(pendingKey, JSON.stringify(pending));
        }
      });
    } else {
      const pendingKey = "beracah_pending_houses";
      const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
      pending.push(newHouse);
      localStorage.setItem(pendingKey, JSON.stringify(pending));
    }
    const updated = houses.concat([newHouse]);
    setHouses(updated);
    localStorage.setItem("beracah_houses_" + session.user.id, JSON.stringify(updated));
    setActiveNamespace(newNS);
    setSelectedHouseId(newHouse.id);
    setShowSetupForm(false);
    setSetupDraft({ building_name:"", breed:"Ross 308", flock_size:"", placement_date:"", flockman_names:"", importLegacy:true });
  };

  const PAGE = { minHeight:"100vh", background:"#F5F7FA", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Inter',sans-serif", padding:20 };
  const CARD = { background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:12, padding:28, maxWidth:380, width:"100%" };
  const INP2 = { width:"100%", background:"#F5F7FA", border:"1px solid #CBD5E1", color:"#1E293B", fontFamily:"'Inter',sans-serif", fontSize:14, padding:"10px 12px", outline:"none", borderRadius:8, marginBottom:12 };
  const LBL2 = { fontSize:11, color:"#64748B", fontWeight:600, marginBottom:5, display:"block" };
  const BTN2 = { width:"100%", background:"#2E7D52", border:"none", color:"#FFFFFF", fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:14, padding:"11px", cursor:"pointer", borderRadius:8 };

  // ── Loading ──
  if (session === undefined) {
    return <div style={PAGE}><div style={{color:authError?"#E91E63":"#64748B",textAlign:"center",maxWidth:320}}>{(typeof authError==="string"&&authError) || "Loading..."}</div></div>;
  }

  // ── Logged out: show login ──
  if (session === null) {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <img src={TVE_LOGO} alt="Tunnel Vent Experts" style={{height:40,marginBottom:16,display:"block"}} />
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:20,color:"#1E293B",marginBottom:4}}>BroilerOps</div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:4}}>made by Tunnel Vent Experts</div>
          <div style={{background:"#2E7D5212",border:"1px solid #2E7D5230",borderRadius:6,padding:"8px 12px",marginBottom:20,textAlign:"center"}}>
            <span style={{fontSize:12,color:"#2E7D52",fontWeight:600}}>45-day free trial</span>
            <span style={{fontSize:11,color:"#64748B"}}> · starts on your first log entry · no credit card required</span>
          </div>
          {magicLinkSent ? (
            <div>
              <div style={{fontSize:13,color:"#2E7D52",background:"#2E7D5212",padding:14,borderRadius:8,marginBottom:16}}>
                Check your email — we sent a sign-in link to {email}.
              </div>
              <div style={{fontSize:12,color:"#64748B",marginBottom:10}}>
                Signing in on a different device than your email? Enter the verification code from the same email instead of clicking the link.
              </div>
              <label style={LBL2}>VERIFICATION CODE</label>
              <input value={otpCode} onChange={function(e){setOtpCode(e.target.value.replace(/\D/g,""));}} placeholder="enter the code from the email" style={{...INP2, fontSize:18, letterSpacing:2, textAlign:"center"}} />
              {authError && <div style={{fontSize:11,color:"#E91E63",marginBottom:10}}>{typeof authError==="string"?authError:"Something went wrong. Please try again."}</div>}
              <button onClick={verifyOtpCode} disabled={verifyingOtp} style={BTN2}>{verifyingOtp ? "VERIFYING..." : "VERIFY CODE"}</button>
              <button onClick={function(){setMagicLinkSent(false);setOtpCode("");setAuthError(null);}} style={{width:"100%",background:"none",border:"none",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:12,padding:10,cursor:"pointer",marginTop:4}}>← use a different email</button>
            </div>
          ) : (
            <div>
              <label style={LBL2}>EMAIL ADDRESS</label>
              <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="you@farm.com" style={INP2} />
              {authError && <div style={{fontSize:11,color:"#E91E63",marginBottom:10}}>{typeof authError==="string"?authError:"Something went wrong. Please try again."}</div>}
              <button onClick={sendMagicLink} style={BTN2}>SEND SIGN-IN LINK</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Logged in, loading houses ──
  if (houses === null) {
    return <div style={PAGE}><div style={{color:"#64748B"}}>Loading your houses...</div></div>;
  }

  // ── Subscription gate ──
  if (subscription === null) {
    return <div style={PAGE}><div style={{color:"#64748B"}}>Checking your account...</div></div>;
  }
  if (subscription.status === "suspended") {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <img src={TVE_LOGO} alt="Tunnel Vent Experts" style={{height:36,marginBottom:16,display:"block"}} />
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#E91E63",marginBottom:8}}>Account Suspended</div>
          {subscription.nickname && <div style={{fontSize:14,color:"#64748B",marginBottom:4}}>Hi {subscription.nickname},</div>}
          <div style={{fontSize:13,color:"#64748B",marginBottom:20,lineHeight:1.6}}>Your account has been suspended. Please contact Tunnel Vent Experts to restore access.</div>
          <div style={{background:"#F5F7FA",borderRadius:8,padding:"12px 16px",fontSize:12,color:"#64748B",marginBottom:16}}>Email: tunnelventexperts@gmail.com</div>
          <button onClick={handleLogout} style={{width:"100%",background:"none",border:"1px solid #CBD5E1",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:12,padding:10,cursor:"pointer",borderRadius:8}}>Sign out</button>
        </div>
      </div>
    );
  }
  if (subscription.status === "trial" && subscription.trial_ends_at && subscription.daysLeft <= 0) {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <img src={TVE_LOGO} alt="Tunnel Vent Experts" style={{height:36,marginBottom:16,display:"block"}} />
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#C4960C",marginBottom:8}}>Your Trial Has Ended</div>
          {subscription.nickname && <div style={{fontSize:14,color:"#64748B",marginBottom:4}}>Hi {subscription.nickname},</div>}
          <div style={{fontSize:13,color:"#64748B",marginBottom:20,lineHeight:1.6}}>Your 45-day free trial has expired. Contact Tunnel Vent Experts to activate your subscription and regain access to all your data.</div>
          <div style={{background:"#F5F7FA",borderRadius:8,padding:"12px 16px",fontSize:12,color:"#64748B",marginBottom:16}}>Email: tunnelventexperts@gmail.com</div>
          <button onClick={handleLogout} style={{width:"100%",background:"none",border:"1px solid #CBD5E1",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:12,padding:10,cursor:"pointer",borderRadius:8}}>Sign out</button>
        </div>
      </div>
    );
  }

  // ── Setup form (first house, or adding another) ──
  if (showSetupForm || houses.length === 0) {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#1E293B"}}>Set up your house</div>
            <button onClick={handleLogout} style={{background:"none",border:"1px solid #CBD5E1",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:10,padding:"5px 10px",cursor:"pointer",borderRadius:6,flexShrink:0}}>LOG OUT</button>
          </div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:18}}>Each house tracks its own cycle and data</div>
          <label style={LBL2}>HOUSE / BUILDING NAME</label>
          <input value={setupDraft.building_name} onChange={function(e){setSetupDraft(function(p){return {...p,building_name:e.target.value};});}} placeholder="e.g. House 1" style={INP2} />
          <label style={LBL2}>BUILDING CAPACITY (heads)</label>
          <input type="number" value={setupDraft.flock_size} onChange={function(e){setSetupDraft(function(p){return {...p,flock_size:e.target.value};});}} placeholder="e.g. 36000" style={INP2} />
          <label style={LBL2}>PLACEMENT DATE (Day 0)</label>
          <input type="date" value={setupDraft.placement_date} onChange={function(e){setSetupDraft(function(p){return {...p,placement_date:e.target.value};});}} style={INP2} />
          <label style={LBL2}>FLOCKMAN NAMES (comma separated, optional)</label>
          <input value={setupDraft.flockman_names} onChange={function(e){setSetupDraft(function(p){return {...p,flockman_names:e.target.value};});}} placeholder="Jerry, Richard, Rodel" style={INP2} />
          {houses.length === 0 && hasLegacyData && (
            <div onClick={function(){setSetupDraft(function(p){return {...p,importLegacy:!p.importLegacy};});}} style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer"}}>
              <div style={{width:16,height:16,borderRadius:3,border:setupDraft.importLegacy?"2px solid #2E7D52":"2px solid #CBD5E1",background:setupDraft.importLegacy?"#2E7D52":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {setupDraft.importLegacy && <span style={{fontSize:9,color:"#FFFFFF",fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:12,color:"#334155"}}>Import existing data already on this device</span>
            </div>
          )}
          <button onClick={submitSetup} style={BTN2}>{houses.length===0?"CREATE FIRST HOUSE":"CREATE HOUSE"}</button>
          {houses.length > 0 && <button onClick={function(){setShowSetupForm(false);}} style={{width:"100%",background:"none",border:"none",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:12,padding:10,cursor:"pointer",marginTop:6}}>cancel</button>}
        </div>
      </div>
    );
  }

  // ── House picker ──
  if (!selectedHouseId) {
    return (
      <div style={PAGE}>
        <div style={{...CARD, maxWidth:460}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#1E293B"}}>Your Houses</div>
            {subscription && subscription.status === "trial" && !subscription.trial_ends_at && (
              <div style={{fontSize:11,color:"#2E7D52",background:"#2E7D5210",border:"1px solid #2E7D5230",borderRadius:6,padding:"4px 10px"}}>
                Trial starts on your first log entry
              </div>
            )}
            {subscription && subscription.status === "trial" && subscription.trial_ends_at && subscription.daysLeft !== null && (
              <div style={{fontSize:11,color:subscription.daysLeft<=7?"#E91E63":"#C4960C",background:subscription.daysLeft<=7?"#E91E6310":"#C4960C10",border:"1px solid "+(subscription.daysLeft<=7?"#E91E6330":"#C4960C30"),borderRadius:6,padding:"4px 10px"}}>
                {subscription.daysLeft} day{subscription.daysLeft!==1?"s":""} left in trial
              </div>
            )}
            <button onClick={handleLogout} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:11,padding:"5px 10px",cursor:"pointer",borderRadius:6}}>LOG OUT</button>
          </div>
          <div style={{display:"grid",gap:8,marginBottom:14}}>
            {houses.map(function(h) {
              const editing = editingHouseId===h.id;
              if (editing) return (
                <div key={h.id} style={{background:"#5B86E512",border:"1px solid #5B86E540",borderRadius:8,padding:"14px"}}>
                  <label style={LBL2}>HOUSE / BUILDING NAME</label>
                  <input value={editHouseDraft.building_name} onChange={function(e){setEditHouseDraft(function(p){return {...p,building_name:e.target.value};});}} style={INP2} />
                  <label style={LBL2}>BUILDING CAPACITY (heads)</label>
                  <input type="number" value={editHouseDraft.flock_size} onChange={function(e){setEditHouseDraft(function(p){return {...p,flock_size:e.target.value};});}} style={INP2} />
                  <label style={LBL2}>PLACEMENT DATE (Day 0)</label>
                  <input type="date" value={editHouseDraft.placement_date} onChange={function(e){setEditHouseDraft(function(p){return {...p,placement_date:e.target.value};});}} style={INP2} />
                  <div style={{fontSize:10,color:"#64748B",marginBottom:12}}>Changing the placement date corrects this house's day counter automatically — your logged data is not affected.</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={saveHouseEdit} style={{...BTN2, width:"auto", flex:1}}>SAVE</button>
                    <button onClick={function(){setEditingHouseId(null);setEditHouseDraft(null);}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:13,padding:"11px",cursor:"pointer",borderRadius:8,flex:1}}>CANCEL</button>
                  </div>
                </div>
              );
              return (
                <div key={h.id} style={{background:"#F5F7FA",border:"1px solid #E2E8F0",borderRadius:8,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div onClick={function(){setActiveNamespace("beracah_house_"+h.id+"_");setSelectedHouseId(h.id);}} style={{cursor:"pointer",flex:1}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:14,color:"#1E293B"}}>{h.building_name}</div>
                    <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{h.breed} · {h.flock_size.toLocaleString()} heads · placed {h.placement_date}</div>
                  </div>
                  <button onClick={function(e){e.stopPropagation();setEditingHouseId(h.id);setEditHouseDraft({building_name:h.building_name,breed:h.breed,flock_size:String(h.flock_size),placement_date:h.placement_date});}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:10,width:28,height:28,cursor:"pointer",borderRadius:6,padding:0,flexShrink:0,marginLeft:10}}>✎</button>
                </div>
              );
            })}
          </div>
          <button onClick={function(){setShowSetupForm(true);}} style={{...BTN2, background:"none", border:"1px solid #2E7D52", color:"#2E7D52"}}>+ ADD ANOTHER HOUSE</button>
        </div>
      </div>
    );
  }

  // ── Render the actual app for the selected house ──
  const house = houses.find(function(h){return h.id===selectedHouseId;});
  if (!house) return <div style={PAGE}><div style={{color:"#64748B"}}>House not found.</div></div>;
  setActiveNamespace("beracah_house_" + house.id + "_");
  return <ErrorBoundary><SupervisorApp house={house} onSwitchHouse={function(){setSelectedHouseId(null);}} onLogout={handleLogout} syncStatus={isOnline?"online":"offline"} syncTick={syncTick} /></ErrorBoundary>;
}

</script>
</body>
</html>
