<script>
function showError(msg) {
  var d = document.getElementById('debug');
  d.style.display = 'block';
  d.textContent += msg + '\n';
}
window.onerror = function(msg, url, line, col, err) {
  if (msg === 'Script error.') return true;
  var detail = msg;
  if (url) detail += '\n  at ' + url + ':' + line + ':' + col;
  if (err && err.stack) detail += '\n' + err.stack;
  showError('RUNTIME ERROR: ' + detail);
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  showError('UNHANDLED PROMISE: ' + (e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'unknown'));
});
</script>

      s.textContent = 'Compile error. See details below.'; return;
    }
    try {
      var sc = document.createElement('script');
      sc.textContent = transformed;
      document.body.appendChild(sc);
    } catch(execErr) {
      showError('EXEC ERROR: ' + execErr.message);
      s.textContent = 'Execution error. See details below.'; return;
    }
    if (typeof AppShell === 'undefined') {
      showError('AppShell not defined after execution');
      s.textContent = 'App failed to initialize.'; return;
    }
    try {
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppShell));
      s.style.display = 'none';
    } catch(renderErr) {
      showError('RENDER ERROR: ' + renderErr.message + '\n' + renderErr.stack);
      s.textContent = 'Render error. See details below.';
    }
  } catch(e) {
    showError('UNEXPECTED: ' + e.message);
    s.textContent = 'Unexpected error. See details below.';
  }
});
</script>

// ─── LEGACY DATA MIGRATION — carries old single-house data into a new house ──
const LEGACY_DATA_KEYS = ["dayOverride","dayAnchor","shiftLogs","taskChecks","tasksByBracket","tunnelLogs","cropLogs","litterLogs","litterScores","litterFlags","litterNotes","flushLogs","incidents","medProgram","lightingProgram","feedingGuide","feedDeliveries","medInventoryLog","crateWeight","chicksPerCrate","crateEntries","placementTrucks","harvestTrucks","activeBracket"];
function migrateLegacyData(oldNS, newNS) {
  LEGACY_DATA_KEYS.forEach(function(k) {
    const v = localStorage.getItem(oldNS + k);
    if (v !== null) localStorage.setItem(newNS + k, v);
  });
}
// ─── ACTIVE NAMESPACE — set by AppShell once a house is selected ────────────
let ACTIVE_NS = "beracah_setup_";
function setActiveNamespace(ns) { ACTIVE_NS = ns; }
// ─── PERSISTENT STATE HOOK ───────────────────────────────────────────────────
// Drop-in replacement for useState that persists to localStorage.
// Key is namespaced per-house so each house's data stays separate.
function useLocalStorage(key, initialValue) {
  const NS = ACTIVE_NS;
  const fullKey = NS + key;
  const [value, setValue] = useState(() => {
    try {
      const item = localStorage.getItem(fullKey);
      return item !== null ? JSON.parse(item) : initialValue;
    } catch (e) {
      return initialValue;
    }
  });
  const setPersistedValue = (newValue) => {
    try {
      const val = typeof newValue === "function" ? newValue(value) : newValue;
      setValue(val);
      localStorage.setItem(fullKey, JSON.stringify(val));
    } catch (e) {
      console.warn("localStorage write failed:", e);
    }
  };
  return [value, setPersistedValue];
}
// ─── CYCLE CONFIG is now built per-house inside SupervisorApp from the `house` prop ──
// ─── MULTI-DEVICE LOG SYNC ────────────────────────────────────────────────────
// Each array-type log (shiftLogs, tunnelLogs, etc.) is synced entry-by-entry to
// Supabase's `sync_entries` table, keyed by (house_id, data_type, local_id).
// This means two devices logging concurrently never overwrite each other —
// each entry is its own row. Local writes are always instant; sync happens
// in the background and merges rather than replaces.
function pendingSyncKey(dataType) { return ACTIVE_NS + "pendingSync_" + dataType; }
function readPendingSync(dataType) {
  try {
    const raw = localStorage.getItem(pendingSyncKey(dataType));
    return raw ? JSON.parse(raw) : { upserts: [], deletes: [] };
  } catch (e) { return { upserts: [], deletes: [] }; }
}
function writePendingSync(dataType, pending) {
  localStorage.setItem(pendingSyncKey(dataType), JSON.stringify(pending));
}
function pushEntriesToSync(dataType, houseId, userId, entries) {
  const sb = getSupabaseClient();
  if (!sb || entries.length === 0) return Promise.resolve();
  const rows = entries.map(function(e) {
    return { house_id: houseId, user_id: userId, data_type: dataType, local_id: e.id, payload: e };
  });
  return sb.from("sync_entries").upsert(rows, { onConflict: "house_id,data_type,local_id" }).then(function(res) {
    if (res.error) {
      const pending = readPendingSync(dataType);
      const existingIds = pending.upserts.map(function(e){ return e.id; });
      entries.forEach(function(e) { if (existingIds.indexOf(e.id) === -1) pending.upserts.push(e); });
      writePendingSync(dataType, pending);
    }
  });
}
function deleteEntriesFromSync(dataType, houseId, ids) {
  const sb = getSupabaseClient();
  if (!sb || ids.length === 0) return Promise.resolve();
  return sb.from("sync_entries").delete().eq("house_id", houseId).eq("data_type", dataType).in("local_id", ids).then(function(res) {
    if (res.error) {
      const pending = readPendingSync(dataType);
      ids.forEach(function(id) { if (pending.deletes.indexOf(id) === -1) pending.deletes.push(id); });
      writePendingSync(dataType, pending);
    }
  });
}
function flushPendingSync(dataType, houseId, userId) {
  const pending = readPendingSync(dataType);
  if (pending.upserts.length === 0 && pending.deletes.length === 0) return;
  writePendingSync(dataType, { upserts: [], deletes: [] }); // clear optimistically, re-queue on failure
  if (pending.upserts.length > 0) pushEntriesToSync(dataType, houseId, userId, pending.upserts);
  if (pending.deletes.length > 0) deleteEntriesFromSync(dataType, houseId, pending.deletes);
}
function getTombstones(dataType) {
  try {
    return JSON.parse(localStorage.getItem(ACTIVE_NS + "tomb_" + dataType) || "[]");
  } catch(e) { return []; }
}
function addTombstones(dataType, ids) {
  var existing = getTombstones(dataType);
  var existingIds = {};
  existing.forEach(function(t){ existingIds[t.id] = true; });
  var now = Date.now();
  var cutoff = now - 30 * 24 * 60 * 60 * 1000; // prune after 30 days
  var pruned = existing.filter(function(t){ return t.deletedAt > cutoff; });
  ids.forEach(function(id){ if (!existingIds[id]) pruned.push({ id: id, deletedAt: now }); });
  localStorage.setItem(ACTIVE_NS + "tomb_" + dataType, JSON.stringify(pruned));
}
function clearTombstones(dataType) {
  localStorage.removeItem(ACTIVE_NS + "tomb_" + dataType);
}
// useSyncedConfig: syncs object-type persistent configs (e.g. tasksByBracket)
// Uses timestamp-based last-write-wins so the newer device's data always wins.
// Payload is wrapped as { _ts: timestamp, data: actualValue } in Supabase.
function useSyncedConfig(key, defaultValue, houseId, userId, isOnline, syncTick) {
  const [value, setValue] = useLocalStorage(key, defaultValue);
  const [localTs, setLocalTs] = useLocalStorage(key + "_ts", 0);

  const pushToRemote = function(ts, data) {
    const sb = getSupabaseClient();
    if (!sb || !houseId || !userId) return;
    sb.from("sync_entries").upsert([{
      house_id: houseId, user_id: userId, data_type: key, local_id: 1,
      payload: { _ts: ts, data: data }
    }], { onConflict: "house_id,data_type,local_id" }).then(function(res) {
      if (res.error) console.warn("useSyncedConfig push failed for " + key + ":", res.error.message);
    });
  };

  useEffect(function() {
    if (!isOnline || !houseId) return;
    const sb = getSupabaseClient();
    if (!sb) return;
    sb.from("sync_entries").select("payload").eq("house_id", houseId).eq("data_type", key).eq("local_id", 1)
      .then(function(res) {
        if (res.error) { console.warn("useSyncedConfig pull failed for " + key + ":", res.error.message); return; }
        if (res.data && res.data.length > 0) {
          const remote = res.data[0].payload;
          const remoteTs = remote._ts || 0;
          if (remoteTs > localTs) {
            // Remote is newer — take it
            setValue(remote.data);
            setLocalTs(remoteTs);
          } else if (localTs > remoteTs) {
            // Local is newer — push up to sync other devices
            pushToRemote(localTs, value);
          }
          // If equal, already in sync — do nothing
        } else {
          // No remote record yet — only push if we have real non-default data
          if (localTs > 0) {
            pushToRemote(localTs, value);
          }
        }
      });
  }, [isOnline, houseId, syncTick]);

  const setSyncedConfig = function(updater) {
    const ts = Date.now();
    setValue(function(prev) {
      const next = typeof updater === "function" ? updater(prev) : updater;
      setLocalTs(ts);
      if (isOnline && houseId) pushToRemote(ts, next);
      return next;
    });
  };
  return [value, setSyncedConfig];
}

// useSyncedLog: drop-in replacement for useLocalStorage for array-type logs.
// On mount/online, does a two-way merge: local-only entries push up,
// remote-only entries pull down. Tombstoned IDs (intentionally deleted)
// are never pulled back from remote, even if the delete failed earlier.
function useSyncedLog(key, houseId, userId, isOnline, syncTick) {
  const [value, setValue] = useLocalStorage(key, []);
  useEffect(function() {
    if (!isOnline || !houseId) return;
    const sb = getSupabaseClient();
    if (!sb) return;
    flushPendingSync(key, houseId, userId);
    const tombType = "tomb_" + key;
    // Phase 1: sync tombstones bidirectionally so deleted entries stay deleted on all devices
    sb.from("sync_entries").select("local_id")
      .eq("house_id", houseId).eq("data_type", tombType)
      .then(function(tombRes) {
        // Pull remote tombstones into local list
        if (tombRes.data && tombRes.data.length > 0) {
          var remoteTombIds = tombRes.data.map(function(r){ return Number(r.local_id); });
          addTombstones(key, remoteTombIds);
        }
        // Push local tombstones to remote so other devices learn about them
        var localTombs = getTombstones(key);
        if (localTombs.length > 0) {
          sb.from("sync_entries").upsert(
            localTombs.map(function(t){ return {
              house_id: houseId, user_id: userId,
              data_type: tombType, local_id: t.id,
              payload: { _tombstone: true, deletedAt: t.deletedAt }
            }; }),
            { onConflict: "house_id,data_type,local_id" }
          );
        }
        // Phase 2: sync actual log entries
        return sb.from("sync_entries").select("local_id,payload")
          .eq("house_id", houseId).eq("data_type", key);
      })
      .then(function(res) {
        if (!res || !res.data) return;
        var tombArr = getTombstones(key);
        var tombIds = {};
        tombArr.forEach(function(t){ tombIds[t.id] = true; });
        var remoteIds = {};
        res.data.forEach(function(r){ remoteIds[r.local_id] = true; });
        // Retry deleting tombstoned entries still on remote
        var staleRemote = tombArr.map(function(t){return t.id;}).filter(function(id){return remoteIds[id];});
        if (staleRemote.length > 0) deleteEntriesFromSync(key, houseId, staleRemote);
        setValue(function(localArr) {
          var localIds = {};
          localArr.forEach(function(e){ localIds[e.id] = true; });
          // Pull remote entries not local and not tombstoned
          var toAdd = res.data
            .filter(function(r){ return !localIds[r.local_id] && !tombIds[r.local_id]; })
            .map(function(r){ return r.payload; });
          var merged = localArr.concat(toAdd);
          // Remove any local entries now known to be tombstoned (from remote tombstones just pulled)
          merged = merged.filter(function(e){ return !tombIds[e.id]; });
          // Push local entries not in remote and not tombstoned
          var toPush = merged.filter(function(e){ return !remoteIds[e.id]; });
          if (toPush.length > 0) pushEntriesToSync(key, houseId, userId, toPush);
          return merged;
        });
      });
  }, [isOnline, houseId, syncTick]);
  const setSyncedValue = function(updater) {
    setValue(function(prev) {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const prevIds = {};
      prev.forEach(function(e){ prevIds[e.id] = e; });
      const nextIds = {};
      next.forEach(function(e){ nextIds[e.id] = true; });
      const toDelete = prev.filter(function(e){ return !nextIds[e.id]; }).map(function(e){ return e.id; });
      // Always record tombstones immediately — even if offline — so they never come back on sync
      if (toDelete.length > 0) {
        addTombstones(key, toDelete);
        if (isOnline && houseId) deleteEntriesFromSync(key, houseId, toDelete);
        else {
          // Queue the delete for when we come back online
          var pending = readPendingSync(key);
          toDelete.forEach(function(id){ if (pending.deletes.indexOf(id) === -1) pending.deletes.push(id); });
          writePendingSync(key, pending);
        }
      }
      if (isOnline && houseId) {
        const toUpsert = next.filter(function(e){ return !prevIds[e.id] || JSON.stringify(prevIds[e.id]) !== JSON.stringify(e); });
        if (toUpsert.length > 0) pushEntriesToSync(key, houseId, userId, toUpsert);
      }
      return next;
    });
  };
  return [value, setSyncedValue];
}

function getCurrentDay(placementDateStr, rolloverHour) {
  // day0Start = first rollover time on placement day (PHT).
  // Before this moment = Day 0. After = Day 1, 2, 3...
  const rolloverMs = (rolloverHour || 0) * 60 * 60 * 1000;
  const day0Start = new Date(placementDateStr + "T00:00:00+08:00").getTime() + rolloverMs;
  const elapsed = Date.now() - day0Start;
  if (elapsed < 0) return 0; // before first rollover = still Day 0
  return Math.floor(elapsed / 86400000) + 1; // Day 1 starts at rollover
}
function getDeviceLabel() {
  const ua = navigator.userAgent || "";
  var os = "Unknown";
  if (/Android/i.test(ua)) os = "Android";
  else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
  else if (/Windows/i.test(ua)) os = "Windows";
  else if (/Macintosh/i.test(ua)) os = "Mac";
  else if (/Linux/i.test(ua)) os = "Linux";
  var browser = "Unknown";
  if (/Edg\//i.test(ua)) browser = "Edge";
  else if (/Chrome\//i.test(ua) && !/Edg\//i.test(ua)) browser = "Chrome";
  else if (/Firefox\//i.test(ua)) browser = "Firefox";
  else if (/Safari\//i.test(ua) && !/Chrome\//i.test(ua)) browser = "Safari";
  var isMobile = /Mobi|Android|iPhone|iPad/i.test(ua);
  return os + " · " + browser + (isMobile ? " · Mobile" : " · Desktop");
}

  return              { label: "HARVEST",   color: "#5C4F8A", short: "HARV" };

// ─── CYCLE SUMMARY HELPER ────────────────────────────────────────────────────
function computeCycleSummary(cycle) {
  var logs = cycle.shiftLogs || [];
  var trucks = cycle.placementTrucks || [];
  var deliveries = cycle.feedDeliveries || [];
  var harvestTks = cycle.harvestTrucks || [];
  var surplus = cycle.surplusFeedBags || 0;

  // Placed birds
  var totalDelivered = trucks.reduce(function(s,t){return s+(t.qty||0);},0);
  var totalDOA = trucks.reduce(function(s,t){return s+(t.doa||0);},0);
  var netPlaced = cycle.flockSize || (totalDelivered - totalDOA) || 0;

  // Mortality: match daily log table exactly — first AM + first PM per unique day
  var days = [];
  var daySet = {};
  logs.forEach(function(l){ if(!daySet[l.day]){daySet[l.day]=true;days.push(l.day);} });
  var totalMortality = days.reduce(function(sum, day) {
    var am = logs.find(function(l){return l.day===day && l.shift==="DAY";});
    var pm = logs.find(function(l){return l.day===day && l.shift==="NIGHT";});
    return sum + (am?am.mortality:0) + (pm?pm.mortality:0);
  }, 0);

  // Feed: total delivered kg minus surplus — more reliable than summing shift logs
  var cbcBags = deliveries.filter(function(d){return d.type==="CBC";}).reduce(function(s,d){return s+(d.qty||0);},0);
  var bscBags = deliveries.filter(function(d){return d.type==="BSC";}).reduce(function(s,d){return s+(d.qty||0);},0);
  var bfpBags = deliveries.filter(function(d){return d.type==="BFP";}).reduce(function(s,d){return s+(d.qty||0);},0);
  var totalDeliveredBags = cbcBags + bscBags + bfpBags;
  var netFeedKg = (totalDeliveredBags - surplus) * 50;

  // Harvest-based metrics
  var totalHarvestedHeads = harvestTks.reduce(function(s,t){return s+(t.heads||0);},0);
  var totalHarvestKg = harvestTks.reduce(function(s,t){return s+(t.kg||0);},0);
  var harvestALW = totalHarvestedHeads > 0 ? totalHarvestKg / totalHarvestedHeads : null;
  var harvestRecovery = netPlaced > 0 && totalHarvestedHeads > 0 ? (totalHarvestedHeads / netPlaced * 100) : null;
  var weightedAge = totalHarvestedHeads > 0 ? harvestTks.reduce(function(s,t){return s+((t.day||0)*(t.heads||0));},0) / totalHarvestedHeads : null;
  var fcr = totalHarvestKg > 0 && netFeedKg > 0 ? netFeedKg / totalHarvestKg : null;
  var feedPerBird = totalHarvestedHeads > 0 ? netFeedKg / totalHarvestedHeads : null;
  var bpi = (harvestRecovery && harvestALW && fcr && weightedAge) ? (harvestRecovery * harvestALW) / (fcr * weightedAge) * 100 : null;

  return {
    netPlaced: netPlaced,
    totalMortality: totalMortality,
    mortalityRate: netPlaced > 0 ? (totalMortality / netPlaced * 100) : null,
    totalHarvestedHeads: totalHarvestedHeads,
    totalHarvestKg: totalHarvestKg,
    harvestRecovery: harvestRecovery,
    finalALWg: harvestALW ? Math.round(harvestALW * 1000) : null,
    weightedAge: weightedAge,
    netFeedKg: netFeedKg,
    totalDeliveredBags: totalDeliveredBags,
    feedPerBird: feedPerBird,
    fcr: fcr,
    bpi: bpi,
    cbcBags: cbcBags, bscBags: bscBags, bfpBags: bfpBags,
    surplus: surplus,
    days: cycle.dayCount || 0,
  };
}

    setTunnelLogs(p => [...p, { ...newTunnel, id:Date.now(), day:logDay, targetTemp:parseFloat(newTunnel.targetTemp)||0, actualTemp:parseFloat(newTunnel.actualTemp)||0, outsideTemp:parseFloat(newTunnel.outsideTemp)||0, sensor1:parseFloat(newTunnel.sensor1)||0, sensor2:parseFloat(newTunnel.sensor2)||0, actualVent:parseInt(newTunnel.actualVent)||0, minVent:parseInt(newTunnel.minVent)||0, maxVent:parseInt(newTunnel.maxVent)||0, humidity:parseInt(newTunnel.humidity)||0, heatersOn:parseInt(newTunnel.heatersOn)||0, padCurtain1:parseInt(newTunnel.padCurtain1)||0, padCurtain2:parseInt(newTunnel.padCurtain2)||0 }]);

  })();

                  </button>

                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:6 }}>
                  {isAlwDay ? "⚖ ALW WEIGH DAY" : "ALW — DAY "+(currentDay)}
                </div>
                {/* Target */}
                <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:8 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:"#C4960C" }}>{targetALW || "—"}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>g</span>
                  <span style={{ fontSize:9, color:"#94A3B8" }}>target</span>
                </div>
                {/* Actual today — weigh days only */}
                {todayAlw ? (
                  <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>
                    actual: <span style={{ color:(todayAlw.alw*1000)>=targetALW?"#2E7D52":"#E91E63", fontWeight:600 }}>{(todayAlw.alw*1000).toFixed(0)}g {(todayAlw.alw*1000)>=targetALW?"✓":"↓"}</span>
                  </div>
                ) : projectedALW ? (
                  <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>projected: {projectedALW.value}g</div>

                  <div style={{ fontSize:9, color:"#94A3B8" }}>no weigh data yet</div>

              <div style={{ background:"#FFFFFF", border:"1px solid #5B86E525", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>TARGET FC — DAY {currentDay}</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:"#5B86E5" }}>{todayFC || "—"}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>bags</span>
                </div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>
                  cumul target: {cumFCTarget} bags
                </div>
              </div>
              {/* Harvest Rate */}
              <div style={{ background:"#FFFFFF", border:"1px solid "+(hrPct>=99?"#2E7D52":hrPct>=97?"#C4960C":"#E91E63")+"25", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>HARVEST RATE</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:hrPct>=99?"#2E7D52":hrPct>=97?"#C4960C":"#E91E63" }}>{hrPct.toFixed(2)}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>%</span>
                </div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>{remainingPopMetric.toLocaleString()} alive · {cumulMortTotal} mort.</div>
              </div>
            </div>
            {/* Today's medicines */}
            {(todayAM.length > 0 || todayPM.length > 0) && (
              <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, marginBottom:16, overflow:"hidden" }}>
                <div style={{ padding:"10px 16px", borderBottom:"1px solid #E2E8F0", fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TODAY'S MEDICINES — Day {currentDay}</div>
                {[["AM","9:00 AM",todayAM,"#E5B80B"], ["PM","9:00 PM",todayPM,"#7B1FA2"]].map(([sess,time,meds,c]) => meds.length>0 && (
                  <div key={sess} style={{ padding:"12px 16px", borderBottom:"1px solid #FFFFFF" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                      <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:12, color:c }}>{sess}</div>
                      <div style={{ fontSize:10, color:"#64748B" }}>{time}</div>
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>

                  <div style={{ fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TASK BRACKET — {getBroodBracket(currentDay)}</div>

                  </button>
                </div>
                {(tasksByBracket[getBroodBracket(currentDay)]||[]).length === 0 ? (
                  <div style={{ padding:"16px", fontSize:11, color:"#94A3B8", textAlign:"center" }}>No tasks added yet for this bracket — tap OPEN TASKS to add some</div>

                  const allTasks = tasksByBracket[getBroodBracket(currentDay)]||[];
                  const pending = allTasks.filter(function(t){ return !taskChecks[t.id]; });
                  const total = allTasks.length;
                  const doneCount = total - pending.length;
                  if (pending.length === 0) return (
                    <div style={{ padding:"16px", fontSize:11, color:"#2E7D52", textAlign:"center", fontWeight:600 }}>✓ All {total} tasks complete</div>
                  );
                  return (
                    <div>
                      {pending.slice(0,4).map(function(t) {
                        return (
                          <div key={t.id} onClick={() => toggleTask(t.id)} className="row" style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderBottom:"1px solid #F0F2F5", cursor:"pointer" }}>
                            <div style={{ width:16, height:16, borderRadius:3, border:"2px solid #CBD5E1", background:"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }} />
                            <div style={{ fontSize:11, color:"#334155" }}>{t.text}</div>
                          </div>
                        );
                      })}
                      {(pending.length > 4 || doneCount > 0) && (
                        <div style={{ padding:"8px 16px", fontSize:10, color:"#64748B" }}>
                          {pending.length > 4 ? ("+ " + (pending.length - 4) + " more pending") : ""}
                          {pending.length > 4 && doneCount > 0 ? " · " : ""}
                          {doneCount > 0 ? (doneCount + " completed") : ""}
                          {" — tap to open full list"}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}
            {/* Today's shift logs */}
            <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, overflow:"hidden" }}>
              <div style={{ padding:"10px 16px", borderBottom:"1px solid #E2E8F0", fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TODAY'S SHIFT RECORDS</div>
              {todayLogs.length === 0 && (
                <div style={{ padding:"20px 16px", fontSize:11, color:"#CBD5E1", textAlign:"center" }}>No records yet for Day {currentDay} — log from DAILY LOG tab</div>
              )}
              {todayLogs.map(l => (
                <div key={l.id} style={{ padding:"12px 16px", borderBottom:"1px solid #F0F2F5" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <span className="pill" style={{ background:l.shift==="DAY"?"#E5B80B20":"#7B1FA220", color:l.shift==="DAY"?"#E5B80B":"#AB47BC" }}>{l.shift} SHIFT</span>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, fontSize:11 }}>
                    <div><span style={{ color:"#64748B" }}>Mortality: </span><span style={{ color:l.mortality>15?"#E91E63":"#1E293B", fontWeight:600 }}>{l.mortality}</span></div>
                    <div><span style={{ color:"#64748B" }}>Feed pulled: </span><span style={{ color:"#1E293B", fontWeight:600 }}>{l.feedsConsumed} bags</span></div>
                    {l.feedBalance !== null && l.feedBalance !== undefined && <div><span style={{ color:"#64748B" }}>Feed bal: </span><span style={{ color:l.feedBalance<100?"#E91E63":"#2E7D52", fontWeight:600 }}>{l.feedBalance} bags</span></div>}
                    <div><span style={{ color:"#64748B" }}>H₂O end: </span><span style={{ color:"#5B86E5", fontWeight:600 }}>{l.waterEnd} m³</span></div>
                  </div>
                  {l.notes && <div style={{ fontSize:10, color:"#64748B", marginTop:6, borderTop:"1px solid #E2E8F0", paddingTop:6 }}>{l.notes}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
        {/* ═══════════════════ DAILY LOG ═══════════════════ */}
        {activeTab==="records" && (
          <div className="su">
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,marginBottom:4}}>Daily Shift Log</div>
            <div style={{fontSize:11,color:"#64748B",marginBottom:16}}>One entry per shift · Day and Night · records feed pulled, mortality, water, ALW</div>
            {/* Log form */}
            <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,padding:16,marginBottom:16}}>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{fontSize:10,color:"#64748B",letterSpacing:1,alignSelf:"center"}}>DAY #</div>
                <input value={logDay} onChange={e=>setLogDay(e.target.value)} style={{...INP,width:70}} />
                {["DAY","NIGHT"].map(s => (
                  <button key={s} onClick={()=>setNewLog(p=>({...p,shift:s}))} style={{
                    background:newLog.shift===s?(s==="DAY"?"#E5B80B20":"#7B1FA220"):"none",
                    border:"1px solid "+(newLog.shift===s?(s==="DAY"?"#E5B80B50":"#AB47BC50"):"#CBD5E1"),
                    color:newLog.shift===s?(s==="DAY"?"#E5B80B":"#AB47BC"):"#64748B",
                    fontFamily:"'Inter',sans-serif",fontSize:10,letterSpacing:1,padding:"6px 16px",cursor:"pointer",borderRadius:4,
                  }}>{s} SHIFT</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:10}}>
                <div><label style={LBL}>MORTALITY (birds)</label><input value={newLog.mortality} onChange={e=>setNewLog(p=>({...p,mortality:e.target.value}))} placeholder="dead birds this shift" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>FEEDS CONSUMED (bags pulled)</label><input value={newLog.feedsConsumed} onChange={e=>setNewLog(p=>({...p,feedsConsumed:e.target.value}))} placeholder="bags pulled from warehouse" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>WATER METER END (m³)</label><input value={newLog.waterEnd} onChange={e=>setNewLog(p=>({...p,waterEnd:e.target.value}))} placeholder="end of shift reading" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>FEED BALANCE (bags in warehouse)</label><input value={newLog.feedBalance} onChange={e=>setNewLog(p=>({...p,feedBalance:e.target.value}))} placeholder="bags remaining" style={{...INP,width:"100%"}} /></div>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{...LBL,color:isAlwDay?"#C4960C":"#64748B"}}>{isAlwDay?"⚖ ALW (g) — weigh day":"ALW (g) — optional"}</label>
                <input value={newLog.alw} onChange={e=>setNewLog(p=>({...p,alw:e.target.value}))} placeholder="e.g. 185" style={{...INP,width:"100%"}} />
              </div>
              <div style={{marginBottom:12}}>
                <label style={LBL}>NOTES / OBSERVATIONS</label>
                <textarea value={newLog.notes} onChange={e=>setNewLog(p=>({...p,notes:e.target.value}))} placeholder="anything unusual this shift" style={{...INP,width:"100%",height:60,resize:"none"}} />
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={addLog} style={{background:editingLogId?"#C4960C":phase.color,border:"none",color:"#F5F7FA",fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11,padding:"10px 24px",cursor:"pointer",borderRadius:6}}>
                  {editingLogId ? "UPDATE ENTRY" : "SUBMIT SHIFT RECORD"}
                </button>
                {editingLogId && <button onClick={()=>{setEditingLogId(null);setNewLog({shift:"DAY",mortality:"",feedsConsumed:"",feedBalance:"",waterEnd:"",alw:"",notes:""});setLogDay(String(currentDay));}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:10,padding:"9px 16px",cursor:"pointer",borderRadius:6}}>CANCEL</button>}
              </div>
            </div>
            {/* TABLE VIEW */}
            {shiftLogs.length > 0 && (
              <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:1100}}>
                  <thead>
                    <tr style={{background:"#F5F7FA",borderBottom:"1px solid #E2E8F0"}}>
                      <th rowSpan={2} style={{padding:"7px 8px",textAlign:"left",color:"#64748B",fontSize:8,letterSpacing:1,fontWeight:600,whiteSpace:"nowrap",borderRight:"1px solid #E2E8F0",position:"sticky",left:0,zIndex:3,background:"#F5F7FA"}}>DATE</th>
                      <th rowSpan={2} style={{padding:"7px 8px",textAlign:"center",color:"#64748B",fontSize:8,letterSpacing:1,fontWeight:600,borderRight:"1px solid #E2E8F0",position:"sticky",left:52,zIndex:3,background:"#F5F7FA"}}>DAY</th>
                      <th colSpan={4} style={{padding:"5px 8px",textAlign:"center",color:"#D4652A",fontSize:8,letterSpacing:1,fontWeight:700,borderBottom:"1px solid #E2E8F0",borderRight:"1px solid #E2E8F0"}}>MORTALITY</th>
                      <th colSpan={4} style={{padding:"5px 8px",textAlign:"center",color:"#2E7D52",fontSize:8,letterSpacing:1,fontWeight:700,borderBottom:"1px solid #E2E8F0",borderRight:"1px solid #E2E8F0"}}>FEEDS</th>
                      <th colSpan={2} style={{padding:"5px 8px",textAlign:"center",color:"#5B86E5",fontSize:8,letterSpacing:1,fontWeight:700,borderBottom:"1px solid #E2E8F0",borderRight:"1px solid #E2E8F0"}}>WATER</th>
                      <th rowSpan={2} style={{padding:"7px 8px",textAlign:"center",color:"#64748B",fontSize:8,letterSpacing:1,fontWeight:600}}>FEED BAL</th>
                      <th rowSpan={2} style={{padding:"7px 8px",textAlign:"center",color:"#C4960C",fontSize:8,letterSpacing:1,fontWeight:600}}>ALW</th>
                      <th rowSpan={2} style={{padding:"7px 8px",textAlign:"left",color:"#64748B",fontSize:8,letterSpacing:1,fontWeight:600}}>NOTES</th>
                      <th rowSpan={2} style={{padding:"7px 4px"}}></th>
                    </tr>
                    <tr style={{background:"#F5F7FA",borderBottom:"1px solid #CBD5E1"}}>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>AM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>PM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>TOTAL</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500,borderRight:"1px solid #E2E8F0"}}>CUM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>AM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>PM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>TOTAL</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500,borderRight:"1px solid #E2E8F0"}}>CUM</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500}}>METER END</th>
                      <th style={{padding:"5px 8px",textAlign:"center",color:"#94A3B8",fontSize:7,fontWeight:500,borderRight:"1px solid #E2E8F0"}}>CONSUMED</th>
                    </tr>
                  </thead>
                  <tbody>
                    <DailyLogRows logs={shiftLogs} currentDay={currentDay} getPhase={getPhase} placementDate={activePlacementDate} FEED_FC={FEED_FC} netPlacedBirds={netPlacedBirds} setShiftLogs={setShiftLogs} setEditingLogId={setEditingLogId} setNewLog={setNewLog} setLogDay={setLogDay} editingLogId={editingLogId}/>
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
{activeTab==="tasks" && (
          <div className="su">
            <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:16, marginBottom:4 }}>Brooding Tasks</div>
            <div style={{ fontSize:11, color:"#64748B", marginBottom:16 }}>Build your own checklist per bracket · use ▲▼ to reorder · carries over to the next grow</div>
            {/* Bracket tabs */}
            <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
              {Object.keys(tasksByBracket).map(b => {
                const list = tasksByBracket[b]||[];
                const total = list.length;
                const done = list.filter(function(t){return taskChecks[t.id];}).length;
                const isCurrent = b === getBroodBracket(currentDay);
                return (
                  <button key={b} onClick={() => setActiveBracket(b)} style={{
                    background: activeBracket===b ? "#D4652A" : isCurrent ? "#D4652A18" : "#FFFFFF", border: activeBracket===b ? "none" : isCurrent ? "1px solid #D4652A40" : "1px solid #E2E8F0", color: activeBracket===b ? "#F5F7FA" : isCurrent ? "#D4652A" : "#64748B",
                    fontFamily:"'Inter',sans-serif", fontSize:10, letterSpacing:.8, padding:"7px 16px", cursor:"pointer", borderRadius:4, fontWeight:600,
                  }}>
                    {b} {["D0–3","D7–9","D10–13","D14"].includes(b) && "⚖"} <span style={{ opacity:.7, fontSize:9 }}>{done}/{total}</span>
                  </button>
                );
              })}
            </div>
            {/* Progress bar */}
            <BracketProgress activeBracket={activeBracket} tasksByBracket={tasksByBracket} taskChecks={taskChecks}/>
            {/* Task list — reorderable */}
            <div style={{ display:"grid", gap:4, marginBottom:10 }}>
              {(tasksByBracket[activeBracket]||[]).map((task,i) => {
                const done = taskChecks[task.id];
                const list = tasksByBracket[activeBracket]||[];
                return (
                  <div key={task.id} style={{
                    display:"flex", alignItems:"flex-start", gap:10, padding:"12px 14px", background:"#FFFFFF", borderRadius:6, border: done ? "1px solid #D4652A30" : (task.custom ? "1px dashed #CBD5E1" : "1px solid #E2E8F0"), transition:"all .12s",
                  }}>
                    <div onClick={() => toggleTask(task.id)} style={{ width:18, height:18, borderRadius:4, flexShrink:0, marginTop:1, border:done?"2px solid #D4652A":"2px solid #CBD5E1", background:done?"#D4652A":"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                      {done && <span style={{ fontSize:10, color:"#F5F7FA", fontWeight:700 }}>✓</span>}
                    </div>
                    <div onClick={() => toggleTask(task.id)} style={{ flex:1, fontSize:12, color:done?"#64748B":"#334155", textDecoration:done?"line-through":"none", lineHeight:1.5, cursor:"pointer" }}>{task.text}</div>
                    {task.custom && <span style={{ fontSize:9, color:"#C4960C60", alignSelf:"center" }}>CUSTOM</span>}
                    <div style={{ display:"flex", gap:3, flexShrink:0, marginTop:1 }}>
                      <button onClick={()=>moveTask(activeBracket,i,-1)} style={{ background:"none", border:"1px solid #CBD5E1", color:i===0?"#E2E8F0":"#64748B", fontFamily:"'Inter',sans-serif", fontSize:10, width:22, height:22, cursor:i===0?"default":"pointer", borderRadius:4, padding:0 }}>▲</button>
                      <button onClick={()=>moveTask(activeBracket,i,1)} style={{ background:"none", border:"1px solid #CBD5E1", color:i===list.length-1?"#E2E8F0":"#64748B", fontFamily:"'Inter',sans-serif", fontSize:10, width:22, height:22, cursor:i===list.length-1?"default":"pointer", borderRadius:4, padding:0 }}>▼</button>
                      <button onClick={()=>removeTask(activeBracket,i)} style={{ background:"none", border:"1px solid #E91E6340", color:"#E91E6380", fontFamily:"'Inter',sans-serif", fontSize:11, width:22, height:22, cursor:"pointer", borderRadius:4, padding:0 }}>×</button>
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Add custom task */}
            <div style={{ display:"flex", gap:8 }}>
              <input value={newTaskText} onChange={e=>setNewTaskText(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") { addCustomTask(activeBracket); } }}
                placeholder={"Add custom task for "+(activeBracket)+"... press Enter"}
                style={{ ...INP, flex:1 }} />
              <button onClick={() => addCustomTask(activeBracket)} style={{ background:"#D4652A", border:"none", color:"#F5F7FA", fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:11, padding:"9px 18px", cursor:"pointer", borderRadius:6 }}>
                + ADD
              </button>
            </div>
          </div>

                      <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:18,color:"#E91E63"}}>{cumulMortTotal}</div>
                      <div style={{fontSize:9,color:"#64748B",marginTop:1}}>{netPlacedBirds>0?((cumulMortTotal/netPlacedBirds)*100).toFixed(2):"—"}% of placed</div>

                  <div style={{background:"#FFF8E8",border:"1px solid #C4960C30",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{flex:1,fontSize:11,color:"#C4960C",fontWeight:600}}>Surplus feed sold to another farm (bags)</div>
                    <input type="number" value={surplusFeedBags||""} onChange={function(e){setSurplusFeedBags(parseInt(e.target.value)||0);}} placeholder="0" style={{width:80,background:"#FFFFFF",border:"1px solid #C4960C40",color:"#1E293B",fontFamily:"'Inter',sans-serif",fontSize:13,padding:"6px 10px",outline:"none",borderRadius:6,textAlign:"center"}} />
                    <div style={{fontSize:10,color:"#94A3B8"}}>excl. from FCR</div>
                  </div>
                </div>
              );
            })()}

            {/* ── LOG FORM ── */}
            <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,padding:16,marginBottom:16}}>

                <div>
                  <label style={LBL}>PLATE NUMBER</label>

                  <label style={LBL}>DAY</label>

                  <label style={LBL}>HEADS</label>
                  <input type="number" value={newHarvest.heads} onChange={function(e){setNewHarvest(function(p){return {...p,heads:e.target.value};});}} placeholder="e.g. 3000" style={{...INP,width:"100%"}} />

            {/* ── PER-DAY BREAKDOWN ── */}
            {harvestTrucks.length === 0 ? (
              <div style={{textAlign:"center",padding:"32px",color:"#94A3B8",fontSize:11}}>No harvest trucks logged yet.</div>

              var days = [];
              var seenDays = {};
              var sorted = [...harvestTrucks].sort(function(a,b){return b.day-a.day;});
              sorted.forEach(function(t){ if(!seenDays[t.day]){seenDays[t.day]=true;days.push(t.day);} });
              return days.map(function(day){
                var trucks = sorted.filter(function(t){return t.day===day;});
                var dayHeads = trucks.reduce(function(s,t){return s+(t.heads||0);},0);
                var dayKg = trucks.reduce(function(s,t){return s+(t.kg||0);},0);
                var dayALW = dayHeads > 0 ? dayKg / dayHeads : 0;
                var dateStr = cycleConfig ? new Date(new Date(cycleConfig.placementDate+"T00:00:00+08:00").getTime()+day*86400000).toLocaleDateString("en-PH",{weekday:"short",month:"short",day:"numeric"}) : "Day "+day;
                return (
                  <div key={day} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"#2E7D5212",borderRadius:"6px 6px 0 0",borderBottom:"2px solid #2E7D5230"}}>
                      <div>
                        <span style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:13,color:"#2E7D52"}}>Day {day}</span>
                        <span style={{fontSize:11,color:"#64748B",marginLeft:8}}>{dateStr}</span>
                      </div>
                      <div style={{display:"flex",gap:16}}>
                        <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#94A3B8"}}>HEADS</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:13,color:"#2E7D52"}}>{dayHeads.toLocaleString()}</div></div>
