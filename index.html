<script>
function showDebug(msg) {
  var d = document.getElementById('debug');
  d.style.display = 'block';
  d.textContent += msg + '\n';
}
window.onerror = function(msg, url, line, col, err) {
  showDebug('ERROR: ' + msg);
  if (err && err.stack) showDebug(err.stack);
};
</script>

<script>
window.addEventListener('load', function() {
  var s = document.getElementById('status');
  try {
    if (typeof React === 'undefined') { showDebug('React not loaded \u2014 connect to internet and refresh'); s.textContent = 'React failed to load. Connect to internet and refresh.'; return; }
    if (typeof Babel === 'undefined') { showDebug('Babel not loaded'); s.textContent = 'Babel failed to load. Connect to internet and refresh.'; return; }
    if (typeof window.supabase === 'undefined') { showDebug('Supabase library not loaded \u2014 check internet connection'); }
    s.textContent = 'Compiling app...';
    var code = document.getElementById('app-code').textContent;
    var transformed = Babel.transform(code, { presets: ['react'] }).code;
    s.textContent = 'Starting...';
    var sc = document.createElement('script');
    sc.textContent = transformed;
    document.body.appendChild(sc);
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppShell));
    s.style.display = 'none';
  } catch(e) {
    showDebug('COMPILE ERROR: ' + e.message);
    if (e.loc) showDebug('Line ' + e.loc.line + ', column ' + e.loc.column);
    s.textContent = 'App failed to start. See error below.';
  }
});
</script>

// ─── PERSISTENT STATE HOOK ───────────────────────────────────────────────────
// Drop-in replacement for useState that persists to localStorage.
// Key is namespaced per-house so each house's data stays separate.
function useLocalStorage(key, initialValue) {
  const NS = ACTIVE_NS;
  const fullKey = NS + key;
  const [value, setValue] = useState(() => {
    try {
      const item = localStorage.getItem(fullKey);
      return item !== null ? JSON.parse(item) : initialValue;
    } catch (e) {
      return initialValue;
    }
  });
  const setPersistedValue = (newValue) => {
    try {
      const val = typeof newValue === "function" ? newValue(value) : newValue;
      setValue(val);
      localStorage.setItem(fullKey, JSON.stringify(val));
    } catch (e) {
      console.warn("localStorage write failed:", e);
    }
  };
  return [value, setPersistedValue];
}

function getCurrentDay(placementDate) {
  // Rolls at midnight Philippine time (UTC+8)
  // Uses fixed PH offset to avoid browser timezone issues
  const PH_OFFSET_MS = 8 * 60 * 60 * 1000;
  const toPHDay = (date) => Math.floor((date.getTime() + PH_OFFSET_MS) / 86400000);
  const placementPHDay = toPHDay(placementDate);
  return Math.max(0, toPHDay(new Date()) - placementPHDay);
}

function DailyLogRows({ logs, currentDay, getPhase, dayAnchor, FEED_FC, netPlacedBirds, setShiftLogs, setEditingLogId, setNewLog, setLogDay, editingLogId }) {
  const days = [...new Set(logs.map(l=>l.day))].sort((a,b)=>a-b);
  let cumMort = 0, cumFeed = 0;
  const rows = [];
  days.forEach(day => {
    const am = logs.find(l=>l.day===day && l.shift==="DAY");
    const pm = logs.find(l=>l.day===day && l.shift==="NIGHT");
    const amMort = am ? am.mortality : null;
    const pmMort = pm ? pm.mortality : null;
    const dayMort = (amMort||0) + (pmMort||0);
    const amFeed = am ? am.feedsConsumed : null;
    const pmFeed = pm ? pm.feedsConsumed : null;
    const dayFeed = (amFeed||0) + (pmFeed||0);
    cumMort += dayMort;
    cumFeed += dayFeed;
    const waterEnd = (pm && pm.waterEnd) || (am && am.waterEnd) || null;
    const feedBal = (pm && pm.feedBalance) || (am && am.feedBalance) || null;
    const alw = (pm && pm.alw) || (am && am.alw) || null;
    const notes = [am && am.notes, pm && pm.notes].filter(Boolean).join(" / ");
    const isToday = day === currentDay;
    const dp = getPhase(day);
    const dateStr = new Date(new Date(dayAnchor).getTime()+day*86400000).toLocaleDateString("en-PH",{month:"short",day:"numeric"});
    const fcRow = FEED_FC.find(r=>r.day===day);
    const feedUnder = fcRow && dayFeed < fcRow.fc;
    const mortTarget = Math.round(netPlacedBirds*0.001);
    const mortOver = dayMort > mortTarget;
    // water consumed = today's waterEnd minus previous day's waterEnd
    let waterConsumed = null;
    if (waterEnd !== null) {
      const prevDay = days[days.indexOf(day)-1];
      if (prevDay !== undefined) {
        const prevPm = logs.find(l=>l.day===prevDay && l.shift==="NIGHT");
        const prevAm = logs.find(l=>l.day===prevDay && l.shift==="DAY");
        const prevWater = (prevPm && prevPm.waterEnd) || (prevAm && prevAm.waterEnd) || null;
        if (prevWater !== null) waterConsumed = waterEnd - prevWater;

    }
    rows.push(
      <tr key={day} style={{borderBottom:"1px solid #F0F2F5",background:isToday?"#C4960C08":"transparent"}}>

  const alwHistory = [...shiftLogs]
    .filter(l => l.alw)

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .su{animation:slideUp .2s ease;}
        .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.5px;}
      `}</style>
      {/* ── HEADER ── */}
      <div style={{ background:"#FFFFFF", borderBottom:"1px solid #E2E8F0", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ background:phase.color, color:"#F5F7FA", fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:10, padding:"3px 8px", letterSpacing:1.5, borderRadius:2 }}>
            {phase.short}
          </div>
          <div>
            <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:14, letterSpacing:.5, color:"#1E293B" }}>
              {CYCLE_CONFIG.building} · Supervisor
            </div>
            <div style={{ fontSize:10, color:"#64748B" }}>{CYCLE_CONFIG.breed} · {CYCLE_CONFIG.flockSize.toLocaleString()} heads</div>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={onSwitchHouse} style={{ background:"none", border:"1px solid #CBD5E1", color:"#64748B", fontFamily:"'Inter',sans-serif", fontSize:10, padding:"5px 10px", cursor:"pointer", borderRadius:6 }}>⇄ SWITCH HOUSE</button>
            {syncStatus && <span style={{ fontSize:9, color:syncStatus==="online"?"#2E7D52":"#D4652A", border:"1px solid "+(syncStatus==="online"?"#2E7D52":"#D4652A")+"40", padding:"4px 8px", borderRadius:6 }}>{syncStatus==="online"?"● SYNCED":"○ OFFLINE"}</span>}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:28, color:phase.color, lineHeight:1 }}>D{currentDay}</div>
              <div style={{ fontSize:9, color:"#64748B", letterSpacing:1 }}>DAY ROLLS MIDNIGHT</div>
              <div style={{ display:"flex", gap:6, justifyContent:"flex-end", marginTop:4 }}>
                <button onClick={nextDay} style={{ background:"none", border:"1px solid "+phase.color+"40", color:phase.color, fontFamily:"'Inter',sans-serif", fontSize:8, padding:"3px 8px", cursor:"pointer", borderRadius:3 }}>NEXT DAY →</button>
              </div>
            </div>
          </div>
          <div style={{ position:"relative" }}>
            <button onClick={()=>setShowReset(v=>!v)} style={{
              background:"none", border:"1px solid #CBD5E1", color:"#94A3B8", fontFamily:"'Inter',sans-serif", fontSize:9, padding:"4px 8px", cursor:"pointer", borderRadius:4, letterSpacing:.5,
            }}>⚙</button>
            {showReset && (
              <div style={{ position:"absolute", right:0, top:32, background:"#FFFFFF", border:"1px solid #E91E6340", borderRadius:6, padding:12, zIndex:200, width:180 }}>
                <div style={{ fontSize:10, color:"#64748B", marginBottom:8 }}>Reset all cycle data?</div>
                <div style={{ fontSize:9, color:"#94A3B8", marginBottom:10 }}>This cannot be undone.</div>
                <button onClick={clearAllData} style={{
                  width:"100%", background:"#E91E6320", border:"1px solid #E91E6350", color:"#E91E63", fontFamily:"'Inter',sans-serif", fontSize:10, padding:"7px", cursor:"pointer", borderRadius:4, letterSpacing:.5,
                }}>CLEAR ALL DATA</button>
                <button onClick={()=>setShowReset(false)} style={{
                  width:"100%", background:"none", border:"none", color:"#94A3B8", fontFamily:"'Inter',sans-serif", fontSize:10, padding:"7px", cursor:"pointer", marginTop:4,
                }}>cancel</button>
                {onLogout && <button onClick={onLogout} style={{
                  width:"100%", background:"none", border:"1px solid #CBD5E1", color:"#64748B", fontFamily:"'Inter',sans-serif", fontSize:10, padding:"7px", cursor:"pointer", borderRadius:4, marginTop:8,
                }}>LOG OUT</button>}
              </div>
            )}
          </div>
        </div>
      </div>
      {/* ── TAB BAR ── */}
      <div style={{ background:"#EDF0F4", borderBottom:"1px solid #E2E8F0", display:"flex", overflowX:"auto", flexShrink:0, scrollbarWidth:"none" }}>
        {TABS.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setActiveTab(t.id)} style={{
            background: activeTab===t.id ? "#2E7D52" : "none", border:"none", whiteSpace:"nowrap", borderRadius: activeTab===t.id ? 6 : 0, color: activeTab===t.id ? "#FFFFFF" : "#64748B",
            fontFamily:"'Inter',sans-serif", fontSize:10, letterSpacing:1.5, padding:"8px 16px", cursor:"pointer", margin:"4px 2px", fontWeight:activeTab===t.id?700:400,
          }}>
            <span style={{ marginRight:5 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
      {/* ── CONTENT ── */}
      <div style={{ flex:1, overflow:"auto", padding:20 }}>
        {/* ═══════════════════ TODAY ═══════════════════ */}
        {activeTab==="today" && (
          <div className="su">
            {/* Phase banner */}
            <div style={{ background:(phase.color)+"12", border:"1px solid "+(phase.color)+"30", borderRadius:8, padding:"16px 20px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:20, color:phase.color }}>{phase.label} — Day {currentDay}</div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:2 }}>
                  {currentDay===0 && "Chick placement day. Record truck arrivals, DOA, and controller setup."}
                  {currentDay>=1 && currentDay<=14 && "Brooding stage · Bracket "+(getBroodBracket(currentDay))+" · "+(14-currentDay)+" days to tunnel transition"}
                  {currentDay>14 && currentDay<=35 && "Tunnel stage · "+(35-currentDay)+" days to target harvest weight"}
                  {currentDay>35 && "Harvest window. Contact supervisor for truck coordination."}
                </div>
              </div>
              {isAlwDay && (
                <div style={{ background:"#C4960C18", border:"1px solid #C4960C50", borderRadius:6, padding:"10px 14px", textAlign:"center" }}>
                  <div style={{ fontSize:18 }}>⚖</div>
                  <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:11, color:"#C4960C" }}>ALW WEIGH</div>
                  <div style={{ fontSize:9, color:"#64748B" }}>1% population</div>
                </div>
              )}
            </div>
            {/* ── 3-card strip: Target ALW · Feed Target · Feed Balance ── */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:8 }}>
              {/* Target ALW */}
              <div style={{ background:"#FFFFFF", border:"1px solid #C4960C25", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:6 }}>
                  {isAlwDay ? "⚖ ALW WEIGH DAY" : "ALW — DAY "+(currentDay)}
                </div>
                {/* Target */}
                <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:8 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:"#C4960C" }}>{targetALW || "—"}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>g</span>
                  <span style={{ fontSize:9, color:"#94A3B8" }}>target</span>
                </div>
                {/* Actual today — weigh days only */}
                {todayAlw ? (
                  <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>
                    actual: <span style={{ color:(todayAlw.alw*1000)>=targetALW?"#2E7D52":"#E91E63", fontWeight:600 }}>{(todayAlw.alw*1000).toFixed(0)}g {(todayAlw.alw*1000)>=targetALW?"✓":"↓"}</span>
                  </div>
                ) : projectedALW ? (
                  <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>projected: {projectedALW.value}g</div>
                ) : (
                  <div style={{ fontSize:9, color:"#94A3B8" }}>no weigh data yet</div>
                )}
              </div>
              {/* Feed target */}
              <div style={{ background:"#FFFFFF", border:"1px solid #5B86E525", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>TARGET FC — DAY {currentDay}</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:"#5B86E5" }}>{todayFC || "—"}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>bags</span>
                </div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>
                  cumul target: {cumFCTarget} bags
                </div>
              </div>
              {/* Feed balance */}
              <div style={{ background:"#FFFFFF", border:"1px solid "+(latestBal<100?"#E91E63":"#2E7D52")+"25", borderRadius:8, padding:"12px 14px", position:"relative" }}>
                {latestBal < 100 && <div style={{ position:"absolute", top:8, right:10, width:6, height:6, borderRadius:"50%", background:"#E91E63", animation:"pulse 1.4s infinite" }} />}
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>FEED BALANCE</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color: latestBal<100?"#E91E63":latestBal<150?"#C4960C":"#2E7D52" }}>{latestBal}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>bags</span>
                </div>
                <div style={{ fontSize:9, color: latestBal<100?"#E91E63":"#64748B", marginTop:2 }}>
                  {latestBal<100 ? "below maintaining balance" : latestBal<150 ? "approaching minimum" : "warehouse balance"}
                </div>
              </div>
            </div>
            {/* Running Performance — compact cards matching ALW/FC/Balance style */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14 }}>
              {/* Harvest Rate */}
              <div style={{ background:"#FFFFFF", border:"1px solid "+(hrPct>=99?"#2E7D52":hrPct>=97?"#C4960C":"#E91E63")+"25", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>HARVEST RATE</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:hrPct>=99?"#2E7D52":hrPct>=97?"#C4960C":"#E91E63" }}>{hrPct.toFixed(2)}</span>
                  <span style={{ fontSize:10, color:"#64748B" }}>%</span>
                </div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>{remainingPopMetric.toLocaleString()} alive</div>
              </div>
              {/* Running FCR */}
              <div style={{ background:"#FFFFFF", border:"1px solid "+(runningFCR?(parseFloat(runningFCR)<1.6?"#2E7D52":parseFloat(runningFCR)<1.8?"#C4960C":"#E91E63"):"#CBD5E1")+"25", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>RUNNING FCR</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:runningFCR?(parseFloat(runningFCR)<1.6?"#2E7D52":parseFloat(runningFCR)<1.8?"#C4960C":"#E91E63"):"#CBD5E1" }}>{runningFCR || "—"}</span>
                </div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:3 }}>total weight: {runningALWkg ? (remainingPopMetric * runningALWkg).toFixed(0) : "—"} kg</div>
              </div>
              {/* BPI Score */}
              <div style={{ background:"#FFFFFF", border:"1px solid "+bpiColor+"25", borderRadius:8, padding:"12px 14px" }}>
                <div style={{ fontSize:9, color:"#64748B", letterSpacing:1, marginBottom:2 }}>BPI SCORE</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:22, color:bpiColor }}>{bpiScore ? bpiScore.toFixed(0) : "—"}</span>
                </div>
              </div>
            </div>
            {/* Today's medicines */}
            {(todayAM.length > 0 || todayPM.length > 0) && (
              <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, marginBottom:16, overflow:"hidden" }}>
                <div style={{ padding:"10px 16px", borderBottom:"1px solid #E2E8F0", fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TODAY'S MEDICINES — Day {currentDay}</div>
                {[["AM","9:00 AM",todayAM,"#E5B80B"], ["PM","9:00 PM",todayPM,"#7B1FA2"]].map(([sess,time,meds,c]) => meds.length>0 && (
                  <div key={sess} style={{ padding:"12px 16px", borderBottom:"1px solid #FFFFFF" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                      <div style={{ fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:12, color:c }}>{sess}</div>
                      <div style={{ fontSize:10, color:"#64748B" }}>{time}</div>
                      {meds[0] && meds[0].waterL > 0 && <div style={{ fontSize:10, color:"#5B86E5" }}>{meds[0].waterL}L water</div>}
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {meds.filter(m=>m.waterL>0||meds.indexOf(m)===0).map((m,i) => (
                        <div key={i} style={{ background:(c)+"14", border:"1px solid "+(c)+"30", borderRadius:4, padding:"4px 10px", fontSize:11, color:c }}>
                          {m.medicine} — {m.dose} {m.unit}{m.waterL>0?" / "+(m.waterL)+"L":""}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
            {todayMeds.length === 0 && (
              <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, padding:"14px 16px", marginBottom:16, fontSize:11, color:"#64748B" }}>
                No medicines scheduled for Day {currentDay}
              </div>
            )}
            {/* Today's task preview */}
            {currentDay <= 14 && (
              <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, overflow:"hidden", marginBottom:16 }}>
                <div style={{ padding:"10px 16px", borderBottom:"1px solid #E2E8F0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TASK BRACKET — {getBroodBracket(currentDay)}</div>
                  <button onClick={() => { setActiveBracket(getBroodBracket(currentDay)); setActiveTab("tasks"); }} style={{ background:"none", border:"1px solid #CBD5E1", color:"#64748B", fontFamily:"'Inter',sans-serif", fontSize:9, padding:"3px 10px", cursor:"pointer", borderRadius:3 }}>
                    OPEN TASKS →
                  </button>
                </div>
                {(tasksByBracket[getBroodBracket(currentDay)]||[]).length === 0 ? (
                  <div style={{ padding:"16px", fontSize:11, color:"#94A3B8", textAlign:"center" }}>No tasks added yet for this bracket — tap OPEN TASKS to add some</div>
                ) : (tasksByBracket[getBroodBracket(currentDay)]||[]).slice(0,4).map((t) => {
                  const done = taskChecks[t.id];
                  return (
                    <div key={t.id} onClick={() => toggleTask(t.id)} className="row" style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderBottom:"1px solid #F0F2F5", cursor:"pointer" }}>
                      <div style={{ width:16, height:16, borderRadius:3, border:done?"2px solid #D4652A":"2px solid #CBD5E1", background:done?"#D4652A":"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {done && <span style={{ fontSize:9, color:"#F5F7FA" }}>✓</span>}
                      </div>
                      <div style={{ fontSize:11, color:done?"#64748B":"#334155", textDecoration:done?"line-through":"none" }}>{t.text}</div>
                    </div>
                  );
                })}
                {(tasksByBracket[getBroodBracket(currentDay)]||[]).length > 4 && (
                  <div style={{ padding:"8px 16px", fontSize:10, color:"#64748B" }}>+ {(tasksByBracket[getBroodBracket(currentDay)]||[]).length - 4} more tasks — tap to open full list</div>
                )}
              </div>
            )}
            {/* Today's shift logs */}
            <div style={{ background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:8, overflow:"hidden" }}>
              <div style={{ padding:"10px 16px", borderBottom:"1px solid #E2E8F0", fontSize:10, color:"#64748B", letterSpacing:1.5, fontWeight:600 }}>TODAY'S SHIFT RECORDS</div>
              {todayLogs.length === 0 && (
                <div style={{ padding:"20px 16px", fontSize:11, color:"#CBD5E1", textAlign:"center" }}>No records yet for Day {currentDay} — log from DAILY LOG tab</div>
              )}
              {todayLogs.map(l => (
                <div key={l.id} style={{ padding:"12px 16px", borderBottom:"1px solid #F0F2F5" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <span className="pill" style={{ background:l.shift==="DAY"?"#E5B80B20":"#7B1FA220", color:l.shift==="DAY"?"#E5B80B":"#AB47BC" }}>{l.shift} SHIFT</span>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, fontSize:11 }}>
                    <div><span style={{ color:"#64748B" }}>Mortality: </span><span style={{ color:l.mortality>15?"#E91E63":"#1E293B", fontWeight:600 }}>{l.mortality}</span></div>
                    <div><span style={{ color:"#64748B" }}>Feed pulled: </span><span style={{ color:"#1E293B", fontWeight:600 }}>{l.feedsConsumed} bags</span></div>
                    <div><span style={{ color:"#64748B" }}>Feed bal: </span><span style={{ color:l.feedBalance<100?"#E91E63":"#2E7D52", fontWeight:600 }}>{l.feedBalance} bags</span></div>
                    <div><span style={{ color:"#64748B" }}>H₂O end: </span><span style={{ color:"#5B86E5", fontWeight:600 }}>{l.waterEnd} m³</span></div>
                  </div>
                  {l.notes && <div style={{ fontSize:10, color:"#64748B", marginTop:6, borderTop:"1px solid #E2E8F0", paddingTop:6 }}>{l.notes}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
        {/* ═══════════════════ DAILY LOG ═══════════════════ */}
        {activeTab==="records" && (
          <div className="su">
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:16,marginBottom:4}}>Daily Shift Log</div>
            <div style={{fontSize:11,color:"#64748B",marginBottom:16}}>One entry per shift · Day and Night · records feed pulled, mortality, water, ALW</div>
            {/* Log form */}
            <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,padding:16,marginBottom:16}}>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{fontSize:10,color:"#64748B",letterSpacing:1,alignSelf:"center"}}>DAY #</div>
                <input value={logDay} onChange={e=>setLogDay(e.target.value)} style={{...INP,width:70}} />
                {["DAY","NIGHT"].map(s => (
                  <button key={s} onClick={()=>setNewLog(p=>({...p,shift:s}))} style={{
                    background:newLog.shift===s?(s==="DAY"?"#E5B80B20":"#7B1FA220"):"none",
                    border:"1px solid "+(newLog.shift===s?(s==="DAY"?"#E5B80B50":"#AB47BC50"):"#CBD5E1"),
                    color:newLog.shift===s?(s==="DAY"?"#E5B80B":"#AB47BC"):"#64748B",
                    fontFamily:"'Inter',sans-serif",fontSize:10,letterSpacing:1,padding:"6px 16px",cursor:"pointer",borderRadius:4,
                  }}>{s} SHIFT</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:10}}>
                <div><label style={LBL}>MORTALITY (birds)</label><input value={newLog.mortality} onChange={e=>setNewLog(p=>({...p,mortality:e.target.value}))} placeholder="dead birds this shift" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>FEEDS CONSUMED (bags pulled)</label><input value={newLog.feedsConsumed} onChange={e=>setNewLog(p=>({...p,feedsConsumed:e.target.value}))} placeholder="bags pulled from warehouse" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>FEED BALANCE (bags in warehouse)</label><input value={newLog.feedBalance} onChange={e=>setNewLog(p=>({...p,feedBalance:e.target.value}))} placeholder="bags remaining" style={{...INP,width:"100%"}} /></div>
                <div><label style={LBL}>WATER METER END (m³)</label><input value={newLog.waterEnd} onChange={e=>setNewLog(p=>({...p,waterEnd:e.target.value}))} placeholder="end of shift reading" style={{...INP,width:"100%"}} /></div>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{...LBL,color:isAlwDay?"#C4960C":"#64748B"}}>{isAlwDay?"⚖ ALW (g) — weigh day":"ALW (g) — optional"}</label>
                <input value={newLog.alw} onChange={e=>setNewLog(p=>({...p,alw:e.target.value}))} placeholder="e.g. 185" style={{...INP,width:"100%"}} />
              </div>
              <div style={{marginBottom:12}}>
                <label style={LBL}>NOTES / OBSERVATIONS</label>
                <textarea value={newLog.notes} onChange={e=>setNewLog(p=>({...p,notes:e.target.value}))} placeholder="anything unusual this shift" style={{...INP,width:"100%",height:60,resize:"none"}} />
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={addLog} style={{background:editingLogId?"#C4960C":phase.color,border:"none",color:"#F5F7FA",fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11,padding:"10px 24px",cursor:"pointer",borderRadius:6}}>
                  {editingLogId ? "UPDATE ENTRY" : "SUBMIT SHIFT RECORD"}
                </button>
                {editingLogId && <button onClick={()=>{setEditingLogId(null);setNewLog({shift:"DAY",mortality:"",feedsConsumed:"",feedBalance:"",waterEnd:"",alw:"",notes:""});setLogDay(String(currentDay));}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:10,padding:"9px 16px",cursor:"pointer",borderRadius:6}}>CANCEL</button>}
              </div>
            </div>
            {/* TABLE VIEW */}
            {shiftLogs.length > 0 && (
              <div style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:8,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:1100}}>
                  <thead>

                            <td style={{padding:"5px 10px",textAlign:"right",color:isToday?"#2E7D52":"#334155",fontWeight:isToday?700:400}}>{actualBags}</td>
                            <td style={{padding:"5px 10px",textAlign:"right"}}>
                              <button onClick={()=>{setEditingFeedIdx(i);setFeedDraft({day:r.day,alw:r.alw,cbc:r.cbc,bsc:r.bsc,bfp:r.bfp,fc:r.fc,cumm:r.cumm,bt:r.bt});}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:10,width:22,height:22,cursor:"pointer",borderRadius:4,padding:0}}>✎</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:9,color:"#94A3B8",marginTop:8}}>* BAGS = BT × {(netPlacedBirds/1000).toFixed(1)}k birds</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// ─── APP SHELL — auth, house picker/setup, offline-first sync ────────────────
// ═════════════════════════════════════════════════════════════════════════════
function AppShell() {
  const [session, setSession] = useState(undefined); // undefined=loading, null=logged out, object=logged in
  const [email, setEmail] = useState("");
  const [magicLinkSent, setMagicLinkSent] = useState(false);
  const [authError, setAuthError] = useState(null);
  const [houses, setHouses] = useState(null); // null=loading
  const [selectedHouseId, setSelectedHouseId] = useState(null);
  const [showSetupForm, setShowSetupForm] = useState(false);
  const [setupDraft, setSetupDraft] = useState({ building_name:"", breed:"Ross 308", flock_size:"", placement_date:"", flockman_names:"", importLegacy:true });
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [editingHouseId, setEditingHouseId] = useState(null);
  const [editHouseDraft, setEditHouseDraft] = useState(null);

  const hasLegacyData = localStorage.getItem("beracah_2026_04_22_h1_shiftLogs") !== null;

  useEffect(() => {
    const sb = getSupabaseClient();
    if (!sb) { setSession(null); setAuthError("Supabase failed to load — check your internet connection and refresh."); return; }
    sb.auth.getSession().then(function(res) { setSession(res.data.session || null); });
    const sub = sb.auth.onAuthStateChange(function(event, newSession) { setSession(newSession || null); });
    const goOnline = () => setIsOnline(true);
    const goOffline = () => setIsOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      if (sub && sub.data && sub.data.subscription) sub.data.subscription.unsubscribe();
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, []);

  // Load houses once logged in
  useEffect(() => {
    if (!session) return;
    const cacheKey = "beracah_houses_" + session.user.id;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try { setHouses(JSON.parse(cached)); } catch (e) { setHouses([]); }
    }
    if (isOnline) {
      const sb = getSupabaseClient();
      const pendingKey = "beracah_pending_houses";
      sb.from("houses").select("*").eq("user_id", session.user.id).order("house_number")
        .then(function(res) {
          if (res.data) {
            const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
            const merged = res.data.concat(pending.filter(function(p) {
              return !res.data.some(function(h){ return h.id===p.id; });
            }));
            setHouses(merged);
            localStorage.setItem(cacheKey, JSON.stringify(merged));
          } else if (!cached) {
            setHouses([]);
          }
        });
      // Flush any pending offline-created houses — only clear queue on confirmed success
      const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
      if (pending.length > 0) {
        sb.from("houses").insert(pending).then(function(res) {
          if (!res.error) {
            localStorage.removeItem(pendingKey);
          } else {
            setAuthError("Could not sync house to server: " + res.error.message + " — your data is safe locally and will retry.");
          }
        });
      }
    } else if (!cached) {
      setHouses([]);
    }
  }, [session, isOnline]);

  const sendMagicLink = () => {
    setAuthError(null);
    if (!email) return;
    const sb = getSupabaseClient();
    if (!sb) { setAuthError("Supabase failed to load — check your internet connection and refresh."); return; }
    sb.auth.signInWithOtp({ email: email }).then(function(res) {
      if (res.error) setAuthError(res.error.message);
      else setMagicLinkSent(true);
    });
  };

  const handleLogout = () => {
    getSupabaseClient().auth.signOut().then(function() {
      setSession(null);
      setHouses(null);
      setSelectedHouseId(null);
    });
  };

  const saveHouseEdit = () => {
    if (!editHouseDraft.building_name || !editHouseDraft.flock_size || !editHouseDraft.placement_date) return;
    const original = houses.find(function(h){ return h.id===editingHouseId; });
    const updatedHouse = {
      ...original,
      building_name: editHouseDraft.building_name,
      breed: editHouseDraft.breed,
      flock_size: parseInt(editHouseDraft.flock_size) || 0,
      placement_date: editHouseDraft.placement_date,
    };
    const updated = houses.map(function(h){ return h.id===editingHouseId ? updatedHouse : h; });
    setHouses(updated);
    localStorage.setItem("beracah_houses_" + session.user.id, JSON.stringify(updated));
    if (isOnline) {
      getSupabaseClient().from("houses").update({
        building_name: updatedHouse.building_name, breed: updatedHouse.breed,
        flock_size: updatedHouse.flock_size, placement_date: updatedHouse.placement_date,
      }).eq("id", editingHouseId).then(function(res) {
        if (res.error) setAuthError("Could not sync the update to the server — it's saved on this device and will retry when online.");
      });
    }
    // If placement date changed, correct this house's day counter to match — without touching its logged data
    if (original.placement_date !== editHouseDraft.placement_date) {
      const ns = "beracah_house_" + editingHouseId + "_";
      const newAnchor = editHouseDraft.placement_date + "T00:00:00+08:00";
      const correctedDay = getCurrentDay(new Date(newAnchor));
      localStorage.setItem(ns+"dayAnchor", JSON.stringify(newAnchor));
      localStorage.setItem(ns+"dayOverride", JSON.stringify(correctedDay));
    }
    setEditingHouseId(null);
    setEditHouseDraft(null);
  };
  const submitSetup = () => {
    if (!setupDraft.building_name || !setupDraft.flock_size || !setupDraft.placement_date) return;
    const newHouse = {
      id: crypto.randomUUID(),
      user_id: session.user.id,
      house_number: houses.length + 1,
      building_name: setupDraft.building_name,
      breed: setupDraft.breed,
      flock_size: parseInt(setupDraft.flock_size) || 0,
      placement_date: setupDraft.placement_date,
      flockman_names: setupDraft.flockman_names ? setupDraft.flockman_names.split(",").map(function(s){return s.trim();}).filter(Boolean) : [],
      created_at: new Date().toISOString(),
    };
    const newNS = "beracah_house_" + newHouse.id + "_";
    if (setupDraft.importLegacy && hasLegacyData) {
      migrateLegacyData("beracah_2026_04_22_h1_", newNS);
    }
    if (isOnline) {
      getSupabaseClient().from("houses").insert(newHouse).then(function(res) {
        if (res.error) {
          const pendingKey = "beracah_pending_houses";
          const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
          pending.push(newHouse);
          localStorage.setItem(pendingKey, JSON.stringify(pending));
        }
      });
    } else {
      const pendingKey = "beracah_pending_houses";
      const pending = JSON.parse(localStorage.getItem(pendingKey) || "[]");
      pending.push(newHouse);
      localStorage.setItem(pendingKey, JSON.stringify(pending));
    }
    const updated = houses.concat([newHouse]);
    setHouses(updated);
    localStorage.setItem("beracah_houses_" + session.user.id, JSON.stringify(updated));
    setActiveNamespace(newNS);
    setSelectedHouseId(newHouse.id);
    setShowSetupForm(false);
    setSetupDraft({ building_name:"", breed:"Ross 308", flock_size:"", placement_date:"", flockman_names:"", importLegacy:true });
  };

  const PAGE = { minHeight:"100vh", background:"#F5F7FA", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Inter',sans-serif", padding:20 };
  const CARD = { background:"#FFFFFF", border:"1px solid #E2E8F0", borderRadius:12, padding:28, maxWidth:380, width:"100%" };
  const INP2 = { width:"100%", background:"#F5F7FA", border:"1px solid #CBD5E1", color:"#1E293B", fontFamily:"'Inter',sans-serif", fontSize:14, padding:"10px 12px", outline:"none", borderRadius:8, marginBottom:12 };
  const LBL2 = { fontSize:11, color:"#64748B", fontWeight:600, marginBottom:5, display:"block" };
  const BTN2 = { width:"100%", background:"#2E7D52", border:"none", color:"#FFFFFF", fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:14, padding:"11px", cursor:"pointer", borderRadius:8 };

  // ── Loading ──
  if (session === undefined) {
    return <div style={PAGE}><div style={{color:authError?"#E91E63":"#64748B",textAlign:"center",maxWidth:320}}>{authError || "Loading..."}</div></div>;
  }

  // ── Logged out: show login ──
  if (session === null) {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <img src={TVE_LOGO} alt="Tunnel Vent Experts" style={{height:40,marginBottom:16,display:"block"}} />
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:20,color:"#1E293B",marginBottom:4}}>BroilerOps</div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:20}}>made by Tunnel Vent Experts</div>
          {magicLinkSent ? (
            <div style={{fontSize:13,color:"#2E7D52",background:"#2E7D5212",padding:14,borderRadius:8}}>
              Check your email — we sent a sign-in link to {email}.
            </div>
          ) : (
            <div>
              <label style={LBL2}>EMAIL ADDRESS</label>
              <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="you@farm.com" style={INP2} />
              {authError && <div style={{fontSize:11,color:"#E91E63",marginBottom:10}}>{authError}</div>}
              <button onClick={sendMagicLink} style={BTN2}>SEND SIGN-IN LINK</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Logged in, loading houses ──
  if (houses === null) {
    return <div style={PAGE}><div style={{color:"#64748B"}}>Loading your houses...</div></div>;
  }

  // ── Setup form (first house, or adding another) ──
  if (showSetupForm || houses.length === 0) {
    return (
      <div style={PAGE}>
        <div style={CARD}>
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#1E293B",marginBottom:4}}>Set up your house</div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:18}}>Each house tracks its own cycle and data</div>
          <label style={LBL2}>HOUSE / BUILDING NAME</label>
          <input value={setupDraft.building_name} onChange={function(e){setSetupDraft(function(p){return {...p,building_name:e.target.value};});}} placeholder="e.g. House 1" style={INP2} />
          <label style={LBL2}>BREED</label>
          <input value={setupDraft.breed} onChange={function(e){setSetupDraft(function(p){return {...p,breed:e.target.value};});}} placeholder="e.g. Ross 308" style={INP2} />
          <label style={LBL2}>FLOCK SIZE (heads placed)</label>
          <input type="number" value={setupDraft.flock_size} onChange={function(e){setSetupDraft(function(p){return {...p,flock_size:e.target.value};});}} placeholder="e.g. 36000" style={INP2} />
          <label style={LBL2}>PLACEMENT DATE (Day 0)</label>
          <input type="date" value={setupDraft.placement_date} onChange={function(e){setSetupDraft(function(p){return {...p,placement_date:e.target.value};});}} style={INP2} />
          <label style={LBL2}>FLOCKMAN NAMES (comma separated, optional)</label>
          <input value={setupDraft.flockman_names} onChange={function(e){setSetupDraft(function(p){return {...p,flockman_names:e.target.value};});}} placeholder="Jerry, Richard, Rodel" style={INP2} />
          {houses.length === 0 && hasLegacyData && (
            <div onClick={function(){setSetupDraft(function(p){return {...p,importLegacy:!p.importLegacy};});}} style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer"}}>
              <div style={{width:16,height:16,borderRadius:3,border:setupDraft.importLegacy?"2px solid #2E7D52":"2px solid #CBD5E1",background:setupDraft.importLegacy?"#2E7D52":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {setupDraft.importLegacy && <span style={{fontSize:9,color:"#FFFFFF",fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:12,color:"#334155"}}>Import existing data already on this device</span>
            </div>
          )}
          <button onClick={submitSetup} style={BTN2}>{houses.length===0?"CREATE FIRST HOUSE":"CREATE HOUSE"}</button>
          {houses.length > 0 && <button onClick={function(){setShowSetupForm(false);}} style={{width:"100%",background:"none",border:"none",color:"#94A3B8",fontFamily:"'Inter',sans-serif",fontSize:12,padding:10,cursor:"pointer",marginTop:6}}>cancel</button>}
        </div>
      </div>
    );
  }

  // ── House picker ──
  if (!selectedHouseId) {
    return (
      <div style={PAGE}>
        <div style={{...CARD, maxWidth:460}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:18,color:"#1E293B"}}>Your Houses</div>
            <button onClick={handleLogout} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:11,padding:"5px 10px",cursor:"pointer",borderRadius:6}}>LOG OUT</button>
          </div>
          <div style={{display:"grid",gap:8,marginBottom:14}}>
            {houses.map(function(h) {
              const editing = editingHouseId===h.id;
              if (editing) return (
                <div key={h.id} style={{background:"#5B86E512",border:"1px solid #5B86E540",borderRadius:8,padding:"14px"}}>
                  <label style={LBL2}>HOUSE / BUILDING NAME</label>
                  <input value={editHouseDraft.building_name} onChange={function(e){setEditHouseDraft(function(p){return {...p,building_name:e.target.value};});}} style={INP2} />
                  <label style={LBL2}>BREED</label>
                  <input value={editHouseDraft.breed} onChange={function(e){setEditHouseDraft(function(p){return {...p,breed:e.target.value};});}} style={INP2} />
                  <label style={LBL2}>FLOCK SIZE (heads placed)</label>
                  <input type="number" value={editHouseDraft.flock_size} onChange={function(e){setEditHouseDraft(function(p){return {...p,flock_size:e.target.value};});}} style={INP2} />
                  <label style={LBL2}>PLACEMENT DATE (Day 0)</label>
                  <input type="date" value={editHouseDraft.placement_date} onChange={function(e){setEditHouseDraft(function(p){return {...p,placement_date:e.target.value};});}} style={INP2} />
                  <div style={{fontSize:10,color:"#64748B",marginBottom:12}}>Changing the placement date corrects this house's day counter automatically — your logged data is not affected.</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={saveHouseEdit} style={{...BTN2, width:"auto", flex:1}}>SAVE</button>
                    <button onClick={function(){setEditingHouseId(null);setEditHouseDraft(null);}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:13,padding:"11px",cursor:"pointer",borderRadius:8,flex:1}}>CANCEL</button>
                  </div>
                </div>
              );
              return (
                <div key={h.id} style={{background:"#F5F7FA",border:"1px solid #E2E8F0",borderRadius:8,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div onClick={function(){setActiveNamespace("beracah_house_"+h.id+"_");setSelectedHouseId(h.id);}} style={{cursor:"pointer",flex:1}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:14,color:"#1E293B"}}>{h.building_name}</div>
                    <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{h.breed} · {h.flock_size.toLocaleString()} heads · placed {h.placement_date}</div>
                  </div>
                  <button onClick={function(e){e.stopPropagation();setEditingHouseId(h.id);setEditHouseDraft({building_name:h.building_name,breed:h.breed,flock_size:String(h.flock_size),placement_date:h.placement_date});}} style={{background:"none",border:"1px solid #CBD5E1",color:"#64748B",fontFamily:"'Inter',sans-serif",fontSize:10,width:28,height:28,cursor:"pointer",borderRadius:6,padding:0,flexShrink:0,marginLeft:10}}>✎</button>
                </div>
              );
            })}
          </div>
          <button onClick={function(){setShowSetupForm(true);}} style={{...BTN2, background:"none", border:"1px solid #2E7D52", color:"#2E7D52"}}>+ ADD ANOTHER HOUSE</button>
        </div>
      </div>
    );
  }

  // ── Render the actual app for the selected house ──
  const house = houses.find(function(h){return h.id===selectedHouseId;});
  if (!house) return <div style={PAGE}><div style={{color:"#64748B"}}>House not found.</div></div>;
  setActiveNamespace("beracah_house_" + house.id + "_");
  return <SupervisorApp house={house} onSwitchHouse={function(){setSelectedHouseId(null);}} onLogout={handleLogout} syncStatus={isOnline?"online":"offline"} />;
}

</script>
</body>
</html>
